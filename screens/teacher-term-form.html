<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no" />
<title>填写学期评价 · 家园共育</title>
<link rel="stylesheet" href="home-school-common.css" />
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="nav-bar"><a class="back" href="teacher-term-evaluation.html">‹</a><div class="nav-title">填写学期评价</div><span></span></div>
  <div class="scroll">
    <div class="chunk form-card">
      <label>评价对象</label>
      <select class="select"><option>陈小明</option><option>李雨萱</option><option>张力轩</option></select>
      <label>五大领域评价</label>
      <textarea class="textarea">健康：动作协调性提升；语言：能完整讲述活动经历；社会：愿意合作；科学：能观察比较；艺术：喜欢用图画表达。</textarea>
      <label>学期综合评语</label>
      <textarea class="textarea">本学期能稳定参与班级活动，规则意识和表达意愿持续提升，建议继续鼓励其在家庭场景中承担小任务。</textarea>
      <div class="action-row" style="margin-top:12px">
        <button class="btn blue">选择导入照片</button>
        <button class="btn green">一键导入</button>
      </div>
      <label>可导入的过往月度照片</label>
      <div class="photo-row"><div class="photo">4月阅读</div><div class="photo">5月运动</div><div class="photo">6月手作</div></div>
      <div style="margin-top:14px"><button class="btn primary" style="width:100%">保存学期评价</button></div>
    </div>
  </div>
</div>
</body>
</html>
