<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no" />
<title>资源库首页 · 幼儿园教师端</title>
<style>
  :root {
    --bg: #f0f5f5; --surface: #ffffff; --fg: #1a1916;
    --muted: #868686; --border: #e0e8e8; --accent: #189b91;
    --accent-dark: #067e76; --accent-light: #e8f5f4;
    --green: #4b9a5a; --green-light: #eaf5ed;
    --amber: #feaf06; --amber-light: #fff7e3;
    --blue: #3388fc; --blue-light: #eaf2ff;
    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; justify-content: center; min-height: 100vh; background: transparent; font-family: var(--font); color: var(--fg); -webkit-font-smoothing: antialiased; }
  button, input { font: inherit; }
  .phone { width: 390px; height: 844px; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; border-radius: 40px; position: relative; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 28px 8px; font-size: 13px; font-weight: 600; background: var(--bg); }
  .nav-bar { display: grid; grid-template-columns: 44px 1fr 44px; align-items: center; padding: 8px 12px 12px; background: var(--bg); }
  .nav-bar a { display: grid; place-items: center; width: 36px; height: 36px; color: var(--fg); text-decoration: none; }
  .nav-title { text-align: center; font-size: 17px; font-weight: 600; }
  .scroll { flex: 1; overflow-y: auto; padding: 0 16px 84px; }
  .scroll::-webkit-scrollbar, .standard-grid::-webkit-scrollbar { display: none; }
  .search-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: 24px; padding: 10px 14px; margin-bottom: 14px; border: 1px solid var(--border); }
  .search-bar input { flex: 1; min-width: 0; border: none; outline: none; font-size: 14px; color: var(--fg); background: transparent; }
  .search-bar input::placeholder { color: var(--muted); }
  .sec { font-size: 16px; font-weight: 700; margin: 18px 0 10px; display: flex; align-items: center; justify-content: space-between; }
  .sec span { font-size: 12px; color: var(--muted); font-weight: 500; }
  .standard-grid { display: flex; gap: 8px; overflow-x: auto; margin: 0 -16px 14px 0; padding-bottom: 2px; }
  .standard-chip { flex: 0 0 auto; min-height: 32px; border: 1px solid var(--border); background: var(--surface); color: var(--fg); border-radius: 999px; padding: 7px 12px; font-size: 12px; }
  .standard-chip.on { border-color: var(--accent); background: var(--accent-light); color: var(--accent-dark); font-weight: 700; }
  .resource-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .resource-entry { min-height: 86px; border: 1px solid var(--border); background: var(--surface); border-radius: 14px; padding: 10px 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; text-decoration: none; color: var(--fg); }
  .resource-entry:active { transform: translateY(1px); background: color-mix(in oklab, var(--surface), var(--bg) 35%); }
  .entry-icon { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; border: 1px solid var(--border); background: var(--accent-light); color: var(--accent-dark); }
  .entry-icon.green { background: var(--green-light); color: var(--green); }
  .entry-icon.amber { background: var(--amber-light); color: color-mix(in oklab, var(--amber), var(--fg) 42%); }
  .entry-icon.blue { background: var(--blue-light); color: var(--blue); }
  .entry-name { max-width: 68px; font-size: 12px; font-weight: 700; line-height: 1.25; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-tag { font-size: 10px; color: var(--muted); }
  .section-note { margin-top: 14px; padding: 12px; border: 1px solid var(--border); border-radius: 14px; background: var(--surface); color: var(--muted); font-size: 12px; line-height: 1.5; }
  .tabs { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; display: flex; justify-content: space-around; align-items: center; padding: 8px 8px 28px; background: var(--surface); border-top: 1px solid var(--border); }
  .tabs a { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; text-decoration: none; color: var(--muted); font-size: 10px; padding: 4px; }
  .tabs a.on { color: var(--accent); }
  .tabs svg { width: 22px; height: 22px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="nav-bar">
    <a href="resource-center.html" aria-label="返回资源中心"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
    <div class="nav-title">资源库</div>
    <span></span>
  </div>
  <div class="scroll">
    <form class="search-bar" id="searchForm">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="search" placeholder="搜索香云纱、双皮奶、龙舟..." />
    </form>

    <div class="sec">衣食住行艺分类 <span id="standardCount">全部资源</span></div>
    <div class="standard-grid" aria-label="衣食住行艺分类">
      <button class="standard-chip on" type="button" data-filter="all">全部</button>
      <button class="standard-chip" type="button" data-filter="衣">衣</button>
      <button class="standard-chip" type="button" data-filter="食">食</button>
      <button class="standard-chip" type="button" data-filter="住">住</button>
      <button class="standard-chip" type="button" data-filter="行">行</button>
      <button class="standard-chip" type="button" data-filter="艺">艺</button>
    </div>

    <div class="sec">资源图标入口 <span>点击进入资源详情</span></div>
    <div class="resource-grid" id="resourceGrid">
      <a class="resource-entry" href="resource-detail.html" data-tag="衣" data-name="香云纱纹样"><div class="entry-icon green"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 4h10l3 5-4 11H8L4 9l3-5z"/><path d="M8 9h8"/><path d="M10 14h4"/></svg></div><div class="entry-name">香云纱纹样</div><div class="entry-tag">衣</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="衣" data-name="广绣小包"><div class="entry-icon green"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="8" width="14" height="11" rx="2"/><path d="M9 8a3 3 0 016 0"/><path d="M8 13h8"/></svg></div><div class="entry-name">广绣小包</div><div class="entry-tag">衣</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="食" data-name="双皮奶"><div class="entry-icon amber"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 11h14l-1.4 8H6.4L5 11z"/><path d="M8 8h8"/><path d="M9 5h6"/></svg></div><div class="entry-name">双皮奶</div><div class="entry-tag">食</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="食" data-name="荔枝蜜"><div class="entry-icon amber"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3c3 3 6 6.5 6 10a6 6 0 01-12 0c0-3.5 3-7 6-10z"/><path d="M9 14h6"/></svg></div><div class="entry-name">荔枝蜜</div><div class="entry-tag">食</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="住" data-name="留耕堂"><div class="entry-icon"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 21h18"/><path d="M5 21V9l7-5 7 5v12"/><path d="M9 21v-6h6v6"/></svg></div><div class="entry-name">留耕堂</div><div class="entry-tag">住</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="住" data-name="沙湾古镇"><div class="entry-icon green"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20h16"/><path d="M6 20V8l6-4 6 4v12"/><path d="M9 20v-5h6v5"/></svg></div><div class="entry-name">沙湾古镇</div><div class="entry-tag">住</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="行" data-name="龙舟竞渡"><div class="entry-icon amber"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 14c4 3 12 3 16 0"/><path d="M6 10h12l-2 5H8l-2-5z"/><path d="M8 7h8"/></svg></div><div class="entry-name">龙舟竞渡</div><div class="entry-tag">行</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="行" data-name="安全过街"><div class="entry-icon blue"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19h16"/><path d="M6 15h12"/><path d="M8 11h8"/><circle cx="8" cy="6" r="2"/><path d="M8 8v3"/></svg></div><div class="entry-name">安全过街</div><div class="entry-tag">行</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="艺" data-name="粤语童谣"><div class="entry-icon blue"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><div class="entry-name">粤语童谣</div><div class="entry-tag">艺</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="艺" data-name="醒狮纹样"><div class="entry-icon green"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8"/><path d="M8 12h8"/><path d="M12 8v8"/></svg></div><div class="entry-name">醒狮纹样</div><div class="entry-tag">艺</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="艺" data-name="粤剧身段"><div class="entry-icon blue"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 18c4-5 12-5 16 0"/><path d="M6 8c3 3 9 3 12 0"/><path d="M12 5v14"/></svg></div><div class="entry-name">粤剧身段</div><div class="entry-tag">艺</div></a>
      <a class="resource-entry" href="resource-detail.html" data-tag="艺" data-name="陶艺纹饰"><div class="entry-icon"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 4h8"/><path d="M10 4c0 4-3 5-3 10a5 5 0 0010 0c0-5-3-6-3-10"/><path d="M9 14h6"/></svg></div><div class="entry-name">陶艺纹饰</div><div class="entry-tag">艺</div></a>
    </div>
    <div class="section-note" id="emptyNote" hidden>当前分类暂无匹配资源，可切换其他衣食住行艺分类或使用搜索。</div>
  </div>

  <div class="tabs">
    <a href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>首页</span></a>
    <a href="school-affairs.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>党建管理</span></a>
    <a href="comprehensive-coordination.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h10"/><circle cx="18" cy="18" r="2"/></svg><span>综合协调</span></a>
    <a class="on" href="training-center.html"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="5"/><path d="M5 21v-3a7 7 0 0114 0v3"/></svg><span>教研培训</span></a>
    <a href="home-school.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg><span>家园共育</span></a>
  </div>
</div>

<script>
  const chips = Array.from(document.querySelectorAll('.standard-chip'));
  const entries = Array.from(document.querySelectorAll('.resource-entry'));
  const count = document.getElementById('standardCount');
  const emptyNote = document.getElementById('emptyNote');
  const input = document.getElementById('searchInput');

  function applyFilter() {
    const active = document.querySelector('.standard-chip.on')?.dataset.filter || 'all';
    const query = input.value.trim().toLowerCase();
    let visible = 0;
    entries.forEach(entry => {
      const tagMatch = active === 'all' || entry.dataset.tag === active;
      const textMatch = !query || entry.dataset.name.toLowerCase().includes(query) || entry.dataset.tag.includes(query);
      const show = tagMatch && textMatch;
      entry.style.display = show ? 'flex' : 'none';
      if (show) visible += 1;
    });
    count.textContent = active === 'all' ? `${visible} 个资源` : `${active} · ${visible} 个`;
    emptyNote.hidden = visible > 0;
  }

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(item => item.classList.remove('on'));
      chip.classList.add('on');
      applyFilter();
    });
  });
  input.addEventListener('input', applyFilter);
  applyFilter();
</script>
</body>
</html>
