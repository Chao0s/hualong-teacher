<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no" />
<title>研修详情 · 教研培训部</title>
<style>
  :root {
    --bg:#f0f5f5; --surface:#fff; --fg:#1a1916; --muted:#868686; --border:#e0e8e8;
    --accent:#189b91; --accent-dark:#067e76; --accent-light:#e8f5f4;
    --green:#4b9a5a; --green-light:#eaf5ed; --amber:#feaf06; --amber-light:#fff7e3; --blue:#3388fc; --blue-light:#eaf2ff;
    --font:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{display:flex;justify-content:center;min-height:100vh;background:transparent;font-family:var(--font);color:var(--fg);-webkit-font-smoothing:antialiased}
  .phone{width:390px;height:844px;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;border-radius:40px;position:relative}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 8px;font-size:13px;font-weight:600}
  .nav-bar{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;padding:8px 12px 12px}.nav-bar a{display:grid;place-items:center;width:36px;height:36px;color:var(--fg);text-decoration:none}.nav-title{text-align:center;font-size:17px;font-weight:600}
  .scroll{flex:1;overflow-y:auto;padding:0 16px 28px}.scroll::-webkit-scrollbar{display:none}
  .head{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:14px}.kicker{font-size:11px;color:var(--accent-dark);font-weight:800;background:var(--accent-light);border-radius:999px;padding:4px 8px;display:inline-flex}.head h1{font-size:20px;line-height:1.25;margin-top:10px}.meta{font-size:12px;color:var(--muted);line-height:1.5;margin-top:8px}
  .sec{font-size:16px;font-weight:700;margin:18px 0 10px;display:flex;justify-content:space-between;align-items:center}.sec span{font-size:12px;color:var(--muted);font-weight:500}
  .chunk{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px;margin-bottom:14px}
  .file{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
  .file:last-child{border-bottom:0}.file-name{font-size:13px;font-weight:700;line-height:1.35}.action{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:6px 9px;font-size:11px;color:var(--fg);text-decoration:none}
  .feedback{padding:10px 0;border-bottom:1px solid var(--border)}.feedback:last-child{border-bottom:0}
  .feedback-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}.teacher{font-size:13px;font-weight:700}.time{font-size:11px;color:var(--muted)}.text{font-size:12px;line-height:1.55;color:var(--fg)}
  .input{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:10px;margin-top:8px}.input input{flex:1;border:1px solid var(--border);outline:0;background:var(--bg);border-radius:999px;padding:8px 10px;font-size:12px}.input button{border:0;border-radius:999px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:7px 11px}
  .signup{display:grid;gap:10px}.signup p{font-size:12px;line-height:1.6;color:var(--muted)}.primary{border:0;border-radius:14px;background:var(--accent);color:#fff;font-size:14px;font-weight:800;padding:12px}.ghost{border:1px solid var(--border);border-radius:14px;background:var(--surface);color:var(--fg);font-size:13px;font-weight:700;padding:10px}
  .toast{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);background:rgba(26,25,22,.88);color:#fff;border-radius:999px;padding:8px 13px;font-size:12px;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="nav-bar">
    <a href="training-list.html" aria-label="返回研修列表"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
    <div class="nav-title">研修详情</div>
    <span></span>
  </div>
  <div class="scroll">
    <section class="head">
      <span class="kicker" id="status">研修活动</span>
      <h1 id="title">幼儿园课程游戏化的理论与实践</h1>
      <div class="meta" id="meta">6月28日 14:00 · 多功能厅 · 主讲：陈园长</div>
      <div class="meta" id="summary">围绕游戏化课程设计、材料投放和教师观察支持展开。</div>
    </section>

    <div class="sec">研修材料 <span>预览 / 下载</span></div>
    <div class="chunk" id="materials"></div>

    <section id="signupBlock">
      <div class="sec">报名入口 <span>最新研修</span></div>
      <div class="chunk signup">
        <p>报名后将自动记录到教师个人研修档案。请确认时间安排后提交报名。</p>
        <button class="primary" type="button" id="signupBtn">立即报名</button>
        <button class="ghost" type="button" id="calendarBtn">加入日程提醒</button>
      </div>
    </section>

    <section id="feedbackBlock">
    <div class="sec">研修反馈 <span id="feedbackCount">3 条</span></div>
    <div class="chunk">
      <div id="feedbacks"></div>
      <div class="input"><input id="feedbackInput" placeholder="写下你的研修反馈..." /><button type="button" data-send="feedback">提交</button></div>
    </div>
    </section>

  </div>
  <div class="toast" id="toast">已提交</div>
</div>
<script>
const DATA = {
  "game-course": {
    status:"即将开始", title:"幼儿园课程游戏化的理论与实践", meta:"6月28日 14:00 · 多功能厅 · 主讲：陈园长", summary:"围绕游戏化课程设计、材料投放和教师观察支持展开。",
    materials:["课程游戏化培训讲义.pdf","游戏材料投放观察表.xlsx","小组研讨记录模板.docx","园本案例：建构区里的桥.pdf"]
  },
  "observation": {
    status:"已完成", title:"幼儿行为观察与记录方法", meta:"6月12日 15:00 · 会议室二 · 主讲：李老师", summary:"练习轶事记录、时间取样和事件取样，并形成班级观察记录样例。",
    materials:["行为观察方法讲义.pdf","轶事记录示例.docx","时间取样记录表.xlsx","观察记录评价标准.pdf","班级观察案例包.zip"]
  },
  "home-connect": {
    status:"已完成", title:"家园沟通技巧与案例分享", meta:"5月30日 10:00 · 线上会议 · 主讲：王主任", summary:"聚焦家长沟通边界、正向反馈和争议场景的回应策略。",
    materials:["家园沟通案例手册.pdf","沟通记录表.docx","线上会议回放链接.txt"]
  },
  "lingnan": {
    status:"报名中", title:"岭南文化融入幼儿园课程专题研修", meta:"7月8日 09:30 · 区教师发展中心 · 主讲：外聘专家", summary:"从地方文化资源采集、活动转化和课程评价三个层面展开。",
    materials:["研修通知.pdf","岭南文化资源清单.xlsx","外出培训报名表.docx","课程转化案例选读.pdf"]
  }
};
const feedbacks = [
  ["黄老师","刚刚","材料中的观察表可以直接用于区域活动，建议后续增加小班样例。"],
  ["林老师","10 分钟前","研修后我准备把留耕堂案例放进本月社会领域主题。"],
  ["陈老师","昨天","反馈表已经提交，材料下载正常。"]
];
const params = new URLSearchParams(location.search);
const id = params.get("id") || "game-course";
const type = params.get("type");
const item = DATA[id] || DATA["game-course"];
const isHistory = type === "history" || item.status === "已完成";
document.getElementById("status").textContent = item.status;
document.getElementById("title").textContent = item.title;
document.getElementById("meta").textContent = item.meta;
document.getElementById("summary").textContent = item.summary;
document.getElementById("signupBlock").style.display = isHistory ? "none" : "block";
document.getElementById("feedbackBlock").style.display = isHistory ? "block" : "none";
document.getElementById("materials").innerHTML = item.materials.map(name => `
  <div class="file"><div class="file-name">${name}</div><a class="action" href="#" onclick="alert('预览：${name}');return false;">预览</a><a class="action" download="${name}" href="data:text/plain;charset=utf-8,${encodeURIComponent(name + ' 示例文件')}">下载</a></div>
`).join("");
const toast = document.getElementById("toast");
function showToast(text){
  toast.textContent = text;
  toast.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => toast.classList.remove("show"), 1300);
}
document.getElementById("signupBtn").addEventListener("click", () => showToast("已提交报名"));
document.getElementById("calendarBtn").addEventListener("click", () => showToast("已加入日程提醒"));
function renderFeedbacks(){
  document.getElementById("feedbacks").innerHTML = feedbacks.map(([teacher,time,text]) => `
    <div class="feedback"><div class="feedback-top"><span class="teacher">${teacher}</span><span class="time">${time}</span></div><div class="text">${text}</div></div>
  `).join("");
  document.getElementById("feedbackCount").textContent = feedbacks.length + " 条";
}
document.querySelector('[data-send="feedback"]').addEventListener("click", () => {
  const input = document.getElementById("feedbackInput");
  const value = input.value.trim();
  if(!value) return;
  feedbacks.unshift(["我","刚刚",value]);
  input.value = "";
  renderFeedbacks();
  showToast("反馈已提交");
});
renderFeedbacks();
</script>
</body>
</html>
