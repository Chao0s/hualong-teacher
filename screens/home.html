<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no">
<title>首页 · 幼儿园教师端</title>
<style>
  :root {
    --bg:      #f0f5f5; --surface: #ffffff; --fg: #1a1916;
    --muted:   #868686; --border: #e0e8e8; --accent: #189b91;
    --accent-dark: #067e76; --accent-light: #e8f5f4;
    --green:   #4b9a5a; --green-light: #eaf5ed;
    --amber:   #feaf06; --amber-light: #fff6df;
    --orange:  #f6762f; --orange-light: #fff0e8;
    --blue:    #3388fc; --blue-light: #e8f2fe;
    --danger:  #dc2626; --danger-light: #feecec;
    --purple:  #7c5cff; --purple-light: #f0edff;
    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
    --radius: 14px; --radius-sm: 9px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; background: transparent;
    font-family: var(--font); color: var(--fg); -webkit-font-smoothing: antialiased;
  }
  button, a { font: inherit; color: inherit; border: 0; background: none; text-align: left; }
  .phone {
    width: 390px; height: 844px; background: var(--bg); display: flex; flex-direction: column; overflow: hidden;
    border-radius: 40px; position: relative;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 8px; font-size: 13px; font-weight: 600; background: var(--bg);
  }
  .status-bar .time { font-size: 15px; }
  .status-icons { display: flex; gap: 5px; align-items: center; font-size: 12px; }
  .nav-bar { text-align: center; padding: 8px 20px 12px; font-size: 17px; font-weight: 600; background: var(--bg); }
  .scroll { flex: 1; overflow-y: auto; padding: 0 16px 80px; scroll-behavior: smooth; }
  .scroll::-webkit-scrollbar { display: none; }

  .banner-wrap { position: relative; border-radius: 16px; overflow: hidden; margin-bottom: 4px; }
  .banner-slide { display: none; }
  .banner-slide.on { display: block; }
  .banner-img {
    width: 100%; height: 150px; border-radius: 16px; display: flex; flex-direction: column;
    align-items: flex-start; justify-content: flex-end; font-size: 18px; font-weight: 700;
    color: #fff; text-align: left; padding: 20px 24px; position: relative; overflow: hidden;
  }
  .banner-sub { font-size: 12px; font-weight: 400; opacity: .88; margin-top: 4px; }
  .banner-img.b1 { background: linear-gradient(135deg, #067e76, #189b91, #45bfb5); }
  .banner-img.b2 { background: linear-gradient(135deg, #2e6b8a, #3388fc, #65b7ff); }
  .banner-img.b3 { background: linear-gradient(135deg, #327f4e, #4b9a5a, #6db87d); }
  .banner-dots { display: flex; gap: 6px; justify-content: center; margin-top: 10px; margin-bottom: 2px; }
  .banner-dot { width: 6px; height: 6px; border-radius: 50%; background: #c9e7e7; transition: .3s; }
  .banner-dot.on { background: var(--accent); width: 20px; border-radius: 3px; }

  .sec { font-size: 16px; font-weight: 650; margin: 22px 0 12px; display: flex; align-items: center; justify-content: space-between; }
  .sec .hint { font-size: 12px; color: var(--muted); font-weight: 500; }

  .todo-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .todo-card {
    min-height: 104px; background: var(--surface); border-radius: 16px; padding: 14px;
    display: flex; flex-direction: column; justify-content: space-between; cursor: pointer;
    transition: transform .15s ease, background .15s ease; color: inherit; text-decoration: none;
  }
  .todo-card:active { transform: scale(.985); background: #f8fbfb; }
  .todo-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; }
  .todo-note { font-size: 11px; color: var(--muted); line-height: 1.35; }
  .todo-badge { align-self: flex-start; font-size: 11px; font-weight: 700; color: var(--accent-dark); background: var(--accent-light); padding: 3px 8px; border-radius: 999px; }
  .dot-icon { width: 28px; height: 28px; border-radius: 10px; display: grid; place-items: center; font-size: 12px; font-weight: 800; }
  .dot-icon.upload { color: var(--accent-dark); background: var(--accent-light); }
  .dot-icon.task { color: #a15d00; background: var(--amber-light); }
  .flow-list { display: flex; flex-direction: column; gap: 8px; }
  .flow-item {
    width: 100%; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
    padding: 11px 12px; border: 1px solid var(--border); border-radius: 12px; background: #fff;
    cursor: pointer; transition: transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .flow-item:active { transform: scale(.985); background: #f8fbfb; }
  .flow-main { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .flow-name { font-size: 13px; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .flow-path { font-size: 11px; color: var(--muted); line-height: 1.35; }
  .flow-state { font-size: 11px; font-weight: 700; padding: 4px 7px; border-radius: 999px; white-space: nowrap; }
  .state-warn { color: #a15d00; background: var(--amber-light); }
  .state-new { color: var(--accent-dark); background: var(--accent-light); }
  .state-info { color: #226ac7; background: var(--blue-light); }

  .quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .quick-item { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 15px 4px; background: var(--surface); border-radius: var(--radius); cursor: pointer; color: inherit; text-decoration: none; }
  .quick-icon { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--accent); }
  .quick-icon svg { width: 22px; height: 22px; }
  .quick-icon.g1 { background: var(--accent-light); }
  .quick-icon.g2 { background: var(--green-light); color: var(--green); }
  .quick-icon.g3 { background: var(--amber-light); color: #c47900; }
  .quick-icon.g4 { background: var(--blue-light); color: var(--blue); }
  .quick-label { font-size: 12px; font-weight: 600; text-align: center; white-space: nowrap; }

  .section-more {
    font-size: 12px; color: var(--accent-dark); font-weight: 650; display: inline-flex;
    align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; text-decoration: none;
  }
  .resource-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .resource-card {
    min-height: 92px; background: var(--surface); border-radius: 14px; padding: 10px 8px;
    display: flex; flex-direction: column; justify-content: space-between; cursor: pointer;
    transition: transform .15s ease, background .15s ease; color: inherit; text-decoration: none;
  }
  .resource-card:active { transform: scale(.985); background: #f8fbfb; }
  .resource-thumb {
    width: 30px; height: 30px; border-radius: 10px; display: grid; place-items: center;
    font-size: 13px; font-weight: 800; color: var(--accent-dark); background: var(--accent-light);
  }
  .resource-card:nth-child(2) .resource-thumb,
  .resource-card:nth-child(5) .resource-thumb { color: var(--green); background: var(--green-light); }
  .resource-card:nth-child(3) .resource-thumb,
  .resource-card:nth-child(6) .resource-thumb { color: #c47900; background: var(--amber-light); }
  .resource-name { font-size: 12px; font-weight: 700; line-height: 1.25; }
  .resource-tag { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .tabs { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; padding: 8px 6px 28px; background: var(--surface); border-top: 1px solid var(--border); }
  .tabs a { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; color: var(--muted); font-size: 9px; padding: 4px 0; min-width: 0; white-space: nowrap; text-decoration: none; }
  .tabs a.on { color: var(--accent); }
  .tabs svg { width: 20px; height: 20px; }
</style>
</head>

<script>
(function(){
  var slides=document.querySelectorAll('.banner-slide'),dots=document.querySelectorAll('.banner-dot'),idx=0;
  function go(i){
    slides.forEach(function(s){s.classList.remove('on')});
    dots.forEach(function(d){d.classList.remove('on')});
    idx=((i%slides.length)+slides.length)%slides.length;
    slides[idx].classList.add('on');dots[idx].classList.add('on');
  }
  setInterval(function(){go(idx+1)},3500);
  var banner=document.getElementById('banner'),sx=0;
  banner.addEventListener('touchstart',function(e){sx=e.touches[0].clientX});
  banner.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)go(idx+(dx<0?1:-1))});

})();
</script>
