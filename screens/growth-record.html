<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no" />
<title>儿童成长档案 · 家园共育</title>
<link rel="stylesheet" href="home-school-common.css" />
<style>
  .record-progress { overflow-x: hidden; }
  .record-progress .prog-table {
    table-layout: fixed;
    min-width: 0;
    width: 100%;
    font-size: 12px;
  }
  .record-progress .prog-table th,
  .record-progress .prog-table td {
    padding: 7px 3px;
    line-height: 1.3;
    text-align: center;
  }
  .record-progress .prog-table th:first-child,
  .record-progress .prog-table td:first-child {
    width: 46px;
    text-align: left;
  }
  .record-progress .prog-table thead tr:first-child th {
    padding-bottom: 3px;
    font-size: 12px;
    font-weight: 700;
    color: #1f2937;
  }
  .record-progress .prog-table thead tr:last-child th {
    padding-top: 3px;
    font-size: 10px;
    font-weight: 600;
    color: #6b7280;
  }
  .record-progress .prog-table .name {
    white-space: normal;
    word-break: keep-all;
    line-height: 1.25;
  }
  .record-progress .status {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 16px;
    font-size: 0;
    line-height: 0;
    color: transparent;
    background: transparent;
    padding: 0;
    border-radius: 0;
  }
  .record-progress .status::before {
    content: "";
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex: 0 0 9px;
  }
  .record-progress .status.done::before {
    background: #16a34a;
  }
  .record-progress .status.wait::before {
    background: #f59e0b;
  }
  .record-progress .status.miss::before {
    border: 1.5px solid #dc2626;
    background: #fff;
  }
  .progress-legend {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 8px;
    font-size: 11px;
    color: #6b7280;
  }
  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    display: inline-block;
  }
  .legend-dot.done { background: #16a34a; }
  .legend-dot.wait { background: #f59e0b; }
  .legend-dot.miss {
    border: 1.5px solid #dc2626;
    background: #fff;
  }
  .record-entry-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }
  .record-entry-row {
    display: grid;
    gap: 10px;
  }
  .record-entry-row.two {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .record-entry-row.three {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  .record-entry {
    min-height: 76px;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    background: #fff;
    color: #1f2937;
    text-decoration: none;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .record-entry strong {
    font-size: 13px;
    line-height: 1.3;
  }
  .record-entry span {
    font-size: 11px;
    color: #6b7280;
    line-height: 1.35;
  }
  .record-entry.primary {
    border-color: #a7f3d0;
    background: #ecfdf5;
  }
  .record-entry.primary strong {
    color: #047857;
  }
</style>
</head>
<body>

        </tbody>
      </table>
      <div class="progress-legend" aria-label="进度状态说明">

  </div>
</div>
