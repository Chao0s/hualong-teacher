<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no" />
<title>发布活动 · 在园时光</title>
<link rel="stylesheet" href="home-school-common.css" />
<style>
  .moment-upload-row {
    gap: 10px;
    padding-top: 10px;
    align-items: flex-start;
  }
  .moment-upload-row .photo {
    width: 82px;
    height: 72px;
    flex-basis: 82px;
    padding: 0;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    position: relative;
  }
  .moment-upload-row .photo-label {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    min-height: 24px;
    display: grid;
    place-items: center;
    padding: 0 4px;
    background: color-mix(in oklab, var(--surface), transparent 10%);
    color: var(--accent-dark);
    font-size: 11px;
    line-height: 1.2;
    font-weight: 700;
  }
  .moment-upload-row .add-photo {
    border-style: dashed;
    flex-direction: column;
    gap: 4px;
    color: var(--accent);
  }
  .moment-upload-row .add-photo .plus {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: var(--accent-light);
    font-size: 18px;
    line-height: 1;
  }
  .moment-upload-row .photo-thumb::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 26% 34%, color-mix(in oklab, var(--accent), white 18%) 0 9px, transparent 10px),
      linear-gradient(145deg, transparent 0 52%, color-mix(in oklab, var(--green-light), var(--accent) 12%) 53% 100%),
      linear-gradient(135deg, var(--accent-light), var(--green-light));
  }
  .moment-upload-row .photo-thumb.group::before {
    background:
      radial-gradient(circle at 34% 38%, color-mix(in oklab, var(--accent), white 16%) 0 8px, transparent 9px),
      radial-gradient(circle at 58% 34%, color-mix(in oklab, var(--green), white 24%) 0 8px, transparent 9px),
      linear-gradient(150deg, var(--green-light), var(--blue-light));
  }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="nav-bar"><a class="back" href="home-school-moments.html">‹</a><div class="nav-title">发布活动</div><span></span></div>
  <div class="scroll">
    <div class="chunk form-card">
      <label>活动名称</label>
      <input class="input" value="端午手作：艾草香囊">
      <label>活动评语</label>
      <textarea class="textarea">孩子们能主动选择材料，尝试闻一闻、摸一摸艾草，并在穿绳和装袋环节互相提醒，整体参与度较高。</textarea>
      <label>添加照片</label>
      <div class="photo-row moment-upload-row">
        <div class="photo add-photo"><span class="plus">+</span><span>添加</span></div>
        <div class="photo photo-thumb"><span class="photo-label">手作过程</span></div>
        <div class="photo photo-thumb group"><span class="photo-label">小组合影</span></div>
      </div>
    </div>

    <div class="chunk">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:15px;font-weight:600">本次涉及幼儿</div>
          <div class="hint" id="selectedHint" style="margin-top:4px">已勾选 7 / 8 人</div>
        </div>
        <strong id="selectedPercent" style="color:var(--accent);font-size:20px">88%</strong>
      </div>
      <div class="progress-line"><div class="bar"><span id="selectedBar" style="width:88%"></span></div></div>
      <div class="table-wrap" style="margin-top:12px">
        <table class="prog-table">
          <thead><tr><th style="text-align:left">班级人数</th><th>已勾选</th><th>占比</th></tr></thead>
          <tbody><tr><td class="name">小一班</td><td id="selectedCount">7人</td><td id="selectedRate"><span class="status done">88%</span></td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="sec">幼儿名单</div>
    <div class="chunk">
      <div class="check-grid compact-checks" id="childChecks">
        <label class="check-card"><input type="checkbox" checked>陈小明</label>
        <label class="check-card"><input type="checkbox" checked>李雨萱</label>
        <label class="check-card"><input type="checkbox" checked>张力轩</label>
        <label class="check-card"><input type="checkbox" checked>王子涵</label>
        <label class="check-card"><input type="checkbox" checked>赵佳怡</label>
        <label class="check-card"><input type="checkbox" checked>刘浩然</label>
        <label class="check-card"><input type="checkbox">周睿阳</label>
        <label class="check-card"><input type="checkbox" checked>何思琪</label>
      </div>
    </div>

    <button class="btn primary sticky-action" type="button">提交活动</button>
  </div>
</div>
<script>
  const childChecks = document.querySelectorAll('#childChecks input');
  const selectedHint = document.getElementById('selectedHint');
  const selectedPercent = document.getElementById('selectedPercent');
  const selectedBar = document.getElementById('selectedBar');
  const selectedCount = document.getElementById('selectedCount');
  const selectedRate = document.getElementById('selectedRate');
  function syncSelectedChildren() {
    const total = childChecks.length;
    const selected = Array.from(childChecks).filter(item => item.checked).length;
    const rate = Math.round(selected / total * 100);
    selectedHint.textContent = `已勾选 ${selected} / ${total} 人`;
    selectedPercent.textContent = `${rate}%`;
    selectedBar.style.width = `${rate}%`;
    selectedCount.textContent = `${selected}人`;
    selectedRate.innerHTML = `<span class="status ${rate >= 80 ? 'done' : 'wait'}">${rate}%</span>`;
  }
  childChecks.forEach(item => item.addEventListener('change', syncSelectedChildren));
  syncSelectedChildren();
</script>
</body>
</html>
