<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no" />
<title>开始综合评估 · 课程建设</title>
<style>
  :root {
    --bg:#f0f5f5; --surface:#fff; --fg:#1a1916; --muted:#868686; --border:#e0e8e8;
    --accent:#189b91; --accent-dark:#067e76; --accent-light:#e8f5f4;
    --green:#4b9a5a; --green-light:#eaf5ed; --amber:#feaf06; --amber-light:#fff7e3;
    --font:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{display:flex;justify-content:center;min-height:100vh;background:transparent;font-family:var(--font);color:var(--fg);-webkit-font-smoothing:antialiased}
  .phone{width:390px;height:844px;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;border-radius:40px;position:relative}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 8px;font-size:13px;font-weight:600}
  .nav-bar{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;padding:8px 12px 12px}
  .nav-bar a{display:grid;place-items:center;width:36px;height:36px;color:var(--fg);text-decoration:none}
  .nav-title{text-align:center;font-size:17px;font-weight:600}
  .mini-menu{position:absolute;top:43px;right:18px;width:74px;height:30px;border-radius:999px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-around;font-size:14px;z-index:20}
  .scroll{flex:1;overflow-y:auto;padding:0 16px 28px}.scroll::-webkit-scrollbar{display:none}
  .chunk{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px}
  .field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}.label{font-size:13px;font-weight:700}.select,.textarea{width:100%;border:1px solid var(--border);border-radius:12px;background:#fff;padding:11px 12px;font:inherit;font-size:13px;color:var(--fg)}.textarea{height:82px;resize:none;line-height:1.5}
  .sec{font-size:16px;font-weight:750;margin:18px 0 10px}
  .domain{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px}
  .domain-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.domain-title{font-size:15px;font-weight:800}.score{font-size:12px;color:var(--accent-dark);font-weight:800}
  .item{border-top:1px solid var(--border);padding-top:12px;margin-top:12px}.item:first-of-type{border-top:0;padding-top:0;margin-top:0}
  .item p{font-size:13px;line-height:1.45;margin-bottom:9px;color:var(--fg)}
  .scale{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.scale input{display:none}.scale label{height:32px;border:1px solid var(--border);border-radius:999px;display:grid;place-items:center;font-size:12px;font-weight:700;background:#fff;color:var(--muted)}
  .scale input:checked + label{background:var(--accent);border-color:var(--accent);color:#fff}
  .summary{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(240,245,245,0),var(--bg) 20%);padding-top:18px}
  .summary-card{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px}
  .avg{font-size:22px;font-weight:850;color:var(--accent-dark)}.hint{font-size:11px;color:var(--muted);margin-top:2px}.btn{border:0;border-radius:999px;background:var(--accent);color:#fff;padding:10px 16px;font-size:13px;font-weight:750}
  .toast{position:absolute;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);background:rgba(26,25,22,.88);color:#fff;border-radius:999px;padding:9px 14px;font-size:12px;opacity:0;pointer-events:none;transition:.22s ease}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="mini-menu"><span>•••</span><span>○</span></div>
  <div class="nav-bar">
    <a href="course-building.html" aria-label="返回课程建设"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
    <div class="nav-title">开始综合评估</div>
    <span></span>
  </div>
  <div class="scroll">
    <section class="chunk">
      <div class="field" style="margin-bottom:0">
        <div class="label">评估对象</div>
        <select class="select" id="child">
          <option>陈小明</option>
          <option>李雨萱</option>
          <option>张力轩</option>
          <option>王子涵</option>
          <option>赵佳怡</option>
        </select>
      </div>
    </section>

    <div class="sec">领域打分</div>
    <div id="domains"></div>

    <div class="summary">
      <div class="summary-card">
        <div>
          <div class="avg" id="avg">4.0</div>
          <div class="hint">当前五大领域平均分</div>
        </div>
        <button class="btn" id="save">保存评估</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast">综合评估已保存</div>
</div>
<script>
const domains = [
  { name:'健康', items:['能积极参与户外活动并保持基本安全意识','能根据活动需要调整动作、控制身体'] },
  { name:'语言', items:['愿意表达自己的发现和想法','能倾听同伴发言并进行简单回应'] },
  { name:'社会', items:['能遵守集体活动规则','能与同伴协商分工并完成任务'] },
  { name:'科学', items:['能通过观察、比较提出问题','能用简单记录表达探索结果'] },
  { name:'艺术', items:['能用绘画、律动或手工表达经验','能欣赏并描述作品中的形式与情绪'] }
];
const values = {};
const domainWrap = document.getElementById('domains');
function render() {
  domainWrap.innerHTML = domains.map((domain, di) => `
    <section class="domain">
      <div class="domain-head">
        <div class="domain-title">${domain.name}</div>
        <div class="score" id="score-${di}">平均 4.0</div>
      </div>
      ${domain.items.map((item, ii) => {
        const key = `${di}-${ii}`;
        values[key] = values[key] || 4;
        return `<div class="item">
          <p>${item}</p>
          <div class="scale">
            ${[1,2,3,4,5].map(num => `
              <input type="radio" name="s-${key}" id="s-${key}-${num}" value="${num}" ${num === values[key] ? 'checked' : ''}>
              <label for="s-${key}-${num}">${num}</label>
            `).join('')}
          </div>
        </div>`;
      }).join('')}
    </section>
  `).join('');
  domainWrap.querySelectorAll('input').forEach(input => {
    input.addEventListener('change', event => {
      const key = event.target.name.replace('s-', '');
      values[key] = Number(event.target.value);
      updateScores();
    });
  });
  updateScores();
}
function updateScores() {
  let all = [];
  domains.forEach((domain, di) => {
    const nums = domain.items.map((_, ii) => values[`${di}-${ii}`] || 4);
    all = all.concat(nums);
    document.getElementById(`score-${di}`).textContent = `平均 ${(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1)}`;
  });
  document.getElementById('avg').textContent = (all.reduce((a,b)=>a+b,0)/all.length).toFixed(1);
}
document.getElementById('save').addEventListener('click', () => {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
});
render();
</script>
</body>
</html>
