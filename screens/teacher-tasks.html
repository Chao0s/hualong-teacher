<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no" />
<title>待办任务 · 幼儿园教师端</title>
<style>
  :root{--bg:#f0f5f5;--surface:#fff;--fg:#1a1916;--muted:#868686;--border:#e0e8e8;--accent:#189b91;--accent-dark:#067e76;--accent-light:#e8f5f4;--green:#4b9a5a;--green-light:#eaf5ed;--amber:#feaf06;--amber-light:#fff7e3;--blue:#3388fc;--blue-light:#eaf2ff;--font:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',system-ui,sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{display:flex;justify-content:center;min-height:100vh;background:transparent;font-family:var(--font);color:var(--fg);-webkit-font-smoothing:antialiased}
  .phone{width:390px;height:844px;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;border-radius:40px;position:relative}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 8px;font-size:13px;font-weight:600}.nav-bar{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;padding:8px 12px 12px}.back{display:grid;place-items:center;width:36px;height:36px;text-decoration:none;color:var(--fg);font-size:24px}.nav-title{text-align:center;font-size:17px;font-weight:700}
  .scroll{flex:1;overflow-y:auto;padding:0 16px 28px}.scroll::-webkit-scrollbar{display:none}
  .sec{font-size:16px;font-weight:750;margin:18px 0 10px;display:flex;justify-content:space-between;align-items:center}.hint{font-size:12px;color:var(--muted);font-weight:600}
  .task-list{display:grid;gap:10px}.task-card{display:block;text-decoration:none;color:inherit;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px}.task-card:active{background:#f8fbfb}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.title{font-size:15px;font-weight:750;line-height:1.35}.status{font-size:10px;border-radius:999px;padding:4px 8px;font-weight:800;white-space:nowrap}.wait{color:#a15d00;background:var(--amber-light)}.doing{color:#226ac7;background:var(--blue-light)}.done{color:var(--green);background:var(--green-light)}
  .meta{font-size:12px;color:var(--muted);line-height:1.5;margin-top:7px}.summary{font-size:12px;line-height:1.55;margin-top:8px}.foot{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.pill{font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:4px 7px}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="nav-bar"><a class="back" href="home.html">‹</a><div class="nav-title">待办任务</div><span></span></div>
  <div class="scroll">
    <div class="sec">当前任务 <span class="hint">2项</span></div>
    <div class="task-list">
      <a class="task-card" href="teacher-task-detail.html?id=resource-pack">
        <div class="top"><div class="title">衣食住行艺课程资源包共建</div><span class="status wait">待接收</span></div>
        <div class="meta">截止 6月28日 · 教研组发起</div>
        <div class="summary">围绕五类生活经验收集班级实践材料，形成可进入资源库和案例库的素材包。</div>
        <div class="foot"><span class="pill">背景信息</span><span class="pill">分工要求</span><span class="pill">时间节点</span></div>
      </a>
      <a class="task-card" href="teacher-task-detail.html?id=community-walk">
        <div class="top"><div class="title">社区建筑观察活动材料提交</div><span class="status doing">进行中</span></div>
        <div class="meta">截止 6月25日 · 年级组发起</div>
        <div class="summary">补充幼儿观察社区建筑的照片、记录和教师转化说明。</div>
        <div class="foot"><span class="pill">照片材料</span><span class="pill">观察记录</span><span class="pill">活动反馈</span></div>
      </a>
    </div>

    <div class="sec">历史任务 <span class="hint">1项</span></div>
    <div class="task-list">
      <a class="task-card" href="teacher-task-detail.html?id=training-feedback">
        <div class="top"><div class="title">课程游戏化研修反馈汇总</div><span class="status done">完成</span></div>
        <div class="meta">6月18日已完成 · 保教主任发起</div>
        <div class="summary">提交研修学习记录、班级实践计划和一条可推广经验。</div>
        <div class="foot"><span class="pill">研修材料</span><span class="pill">反馈表</span><span class="pill">已归档</span></div>
      </a>
    </div>
  </div>
</div>
</body>
</html>
