<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no">
<title>综合协调部 · 幼儿园教师端</title>
<style>
  :root {
    --bg: #f0f5f5; --surface: #ffffff; --fg: #1a1916;
    --muted: #868686; --border: #e0e8e8; --accent: #189b91;
    --accent-dark: #067e76; --accent-light: #e8f5f4;
    --green: #4b9a5a; --green-light: #eaf5ed;
    --amber: #feaf06; --amber-light: #fff7e3;
    --orange: #f6762f; --orange-light: #fff0e7;
    --blue: #3388fc; --blue-light: #e8f2fe;
    --red: #dc2626; --red-light: #fdecec;
    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; background: transparent; font-family: var(--font); color: var(--fg); -webkit-font-smoothing: antialiased; }
  .phone { width: 390px; height: 844px; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; border-radius: 40px; position: relative; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 28px 8px; font-size: 13px; font-weight: 600; background: var(--bg); }
  .nav-bar { text-align: center; padding: 8px 20px 12px; font-size: 17px; font-weight: 600; background: var(--bg); }
  .scroll { flex: 1; overflow-y: auto; padding: 0 16px 88px; scroll-behavior: smooth; }
  .scroll::-webkit-scrollbar { display: none; }

  .banner { position: relative; min-height: 138px; border-radius: 16px; padding: 18px; margin-bottom: 18px; overflow: hidden; background: var(--surface); border: 1px solid var(--border); }
  .banner::after { content: ""; position: absolute; right: -20px; bottom: -30px; width: 150px; height: 150px; border-radius: 50%; background: var(--accent-light); }
  .banner-kicker { position: relative; z-index: 1; display: inline-flex; align-items: center; height: 24px; padding: 0 10px; border-radius: 999px; background: var(--accent-light); color: var(--accent-dark); font-size: 11px; font-weight: 600; }
  .banner h2 { position: relative; z-index: 1; margin-top: 14px; font-size: 21px; line-height: 1.25; font-weight: 700; letter-spacing: -.01em; }
  .banner p { position: relative; z-index: 1; width: 235px; margin-top: 6px; font-size: 12px; line-height: 1.5; color: var(--muted); }
  .banner-mark { position: absolute; right: 18px; bottom: 16px; z-index: 1; width: 56px; height: 56px; border-radius: 18px; display: grid; place-items: center; background: var(--accent); color: #fff; font-size: 22px; font-weight: 700; }

  .sec { font-size: 16px; font-weight: 700; margin: 20px 0 10px; display: flex; align-items: center; justify-content: space-between; }
  .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 6px; }
  .section-grid.three { grid-template-columns: repeat(3, 1fr); }
  .entry-card { min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 13px 12px; cursor: pointer; color: inherit; font: inherit; text-align: left; text-decoration: none; }
  .entry-card:active, .tabs a:active { transform: scale(.985); }
  .entry-card h3 { font-size: 14px; font-weight: 700; line-height: 1.2; }
  .entry-card p { font-size: 11px; color: var(--muted); line-height: 1.35; }
  .ec-icon { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 12px; background: var(--accent-light); color: var(--accent-dark); font-size: 13px; font-weight: 800; }
  .section-grid.three .entry-card { min-height: 106px; padding: 12px 10px; }
  .section-grid.three .entry-card h3 { font-size: 13px; }

  .recent { display: grid; gap: 7px; margin-top: 16px; }
  .task-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; }
  .task-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .task-body { flex: 1; min-width: 0; }
  .task-body .tn { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-body .tm { font-size: 12px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-arrow { color: var(--muted); font-size: 14px; }

  .tabs { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; padding: 8px 6px 28px; background: var(--surface); border-top: 1px solid var(--border); }
  .tabs a { border: 0; background: none; font: inherit; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; color: var(--muted); font-size: 9px; padding: 4px 0; min-width: 0; white-space: nowrap; text-decoration: none; }
  .tabs a.on { color: var(--accent); font-weight: 700; }
  .tabs svg { width: 20px; height: 20px; }
  .toast { position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%) translateY(12px); max-width: 300px; padding: 9px 13px; border-radius: 999px; background: rgba(26,25,22,.86); color: #fff; font-size: 12px; opacity: 0; pointer-events: none; transition: .22s ease; z-index: 20; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span class="time">9:41</span><span class="status-icons" style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="nav-bar">综合协调部</div>
  <main class="scroll">
    <section class="banner">
      <div class="banner-kicker">园务协同支持</div>
      <h2>统筹行政、人事与后勤保障</h2>
      <p>集中查看园内制度、通知、安全卫生与教师发展支持事项。</p>
      <div class="banner-mark">协</div>
    </section>

    <div class="sec">行政统筹</div>
    <section class="section-grid three" aria-label="行政统筹">
      <a class="entry-card" href="coordination-file-list.html?type=policy" aria-label="政策法规文件列表">
        <div class="ec-icon">政</div>
        <h3>政策法规</h3>
        <p>政策文件与制度依据</p>
      </a>
      <a class="entry-card" href="coordination-file-list.html?type=notice" aria-label="通知文件列表">
        <div class="ec-icon" style="background:var(--blue-light);color:var(--blue)">通</div>
        <h3>通知文件</h3>
        <p>园内通知与文件流转</p>
      </a>
      <a class="entry-card" href="coordination-file-list.html?type=org" aria-label="组织架构文件列表">
        <div class="ec-icon" style="background:var(--amber-light);color:var(--amber)">组</div>
        <h3>组织架构</h3>
        <p>部门职责与人员分工</p>
      </a>
    </section>

    <div class="sec">通勤保障</div>
    <section class="section-grid" aria-label="通勤保障">
      <a class="entry-card" href="coordination-file-list.html?type=safety" aria-label="安全管理文件列表">
        <div class="ec-icon" style="background:var(--red-light);color:var(--red)">安</div>
        <h3>安全管理</h3>
        <p>安全巡检、应急预案与记录</p>
      </a>
      <a class="entry-card" href="coordination-file-list.html?type=health" aria-label="卫生保健文件列表">
        <div class="ec-icon" style="background:var(--green-light);color:var(--green)">卫</div>
        <h3>卫生保健</h3>
        <p>晨检、消毒与健康提醒</p>
      </a>
    </section>

    <div class="sec">人事管理</div>
    <section class="section-grid" aria-label="人事管理">
      <a class="entry-card" href="coordination-file-list.html?type=ethics" aria-label="师德师风文件列表">
        <div class="ec-icon" style="background:var(--orange-light);color:var(--orange)">德</div>
        <h3>师德师风</h3>
        <p>学习记录、承诺书与考核材料</p>
      </a>
      <a class="entry-card" href="coordination-file-list.html?type=exchange" aria-label="跟岗交流文件列表">
        <div class="ec-icon" style="background:var(--blue-light);color:var(--blue)">岗</div>
        <h3>跟岗交流</h3>
        <p>跟岗安排、交流记录与反馈</p>
      </a>
    </section>
  </main>

  <div class="tabs" aria-label="底部导航">
    <a href="home.html"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>首页</span></a>
    <a href="school-affairs.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l2.4 4.9 5.4.8-3.9 3.8.9 5.4L12 15.4 7.2 18l.9-5.4-3.9-3.8 5.4-.8L12 3z"/></svg><span>党建管理</span></a>
    <a class="on" href="comprehensive-coordination.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h16M4 17h16"/><circle cx="8" cy="7" r="1.5" fill="currentColor"/><circle cx="16" cy="12" r="1.5" fill="currentColor"/><circle cx="11" cy="17" r="1.5" fill="currentColor"/></svg><span>综合协调</span></a>
    <a href="training-center.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5.5A2.5 2.5 0 016.5 3H20v16H6.5A2.5 2.5 0 014 16.5v-11z"/><path d="M8 7h8M8 11h8M8 15h5"/></svg><span>教研培训</span></a>
    <a href="home-school.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg><span>家园共育</span></a>
  </div>
  <div class="toast" id="toast">入口链接后续导入</div>
</div>
<script>
(function(){
  var toast = document.getElementById('toast');
  var timer;
  document.querySelectorAll('[data-target]').forEach(function(el){
    el.addEventListener('click', function(){
      toast.textContent = el.getAttribute('data-target') + '：链接后续导入';
      toast.classList.add('show');
      clearTimeout(timer);
      timer = setTimeout(function(){ toast.classList.remove('show'); }, 1200);
    });
  });
})();
</script>
</body>
</html>
