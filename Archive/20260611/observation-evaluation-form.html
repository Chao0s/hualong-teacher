<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no">
<title>开始评价 · 幼儿园教师端</title>
<style>
  :root {
    --bg: #f0f5f5; --surface: #ffffff; --fg: #1a1916;
    --muted: #868686; --border: #e0e8e8; --accent: #189b91;
    --accent-dark: #067e76; --accent-light: #e8f5f4;
    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; background: transparent; font-family: var(--font); color: var(--fg); -webkit-font-smoothing: antialiased; }
  .phone { width: 390px; height: 844px; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; border-radius: 40px; position: relative; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 28px 8px; font-size: 13px; font-weight: 600; background: var(--bg); }
  .nav-bar { display: flex; align-items: center; justify-content: center; padding: 8px 20px 12px; font-size: 17px; font-weight: 600; background: var(--bg); position: relative; }
  .back { position: absolute; left: 16px; top: 7px; width: 30px; height: 30px; display: grid; place-items: center; color: var(--accent); text-decoration: none; font-size: 20px; }
  .scroll { flex: 1; overflow-y: auto; padding: 0 16px 24px; }
  .scroll::-webkit-scrollbar { display: none; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; margin-bottom: 7px; font-size: 13px; font-weight: 600; }
  .field input, .field select, .field textarea { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: #fbfdfd; color: var(--fg); font-family: var(--font); font-size: 14px; padding: 11px 12px; outline: none; }
  .field textarea { min-height: 128px; resize: none; line-height: 1.5; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24,155,145,.12); }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .photo-box { position: relative; height: 82px; border: 1px dashed var(--border); border-radius: 12px; background: #fbfdfd; display: grid; place-items: center; color: var(--muted); font-size: 12px; text-align: center; overflow: hidden; }
  .photo-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-box.filled { border-style: solid; background: var(--accent-light); color: var(--accent-dark); font-weight: 600; }
  .submit { width: 100%; height: 44px; border: 0; border-radius: 12px; background: var(--accent); color: #fff; font-family: var(--font); font-size: 15px; font-weight: 600; margin-top: 2px; }
  .toast { display: none; margin-top: 12px; padding: 10px 12px; border-radius: 10px; background: var(--accent-light); color: var(--accent-dark); font-size: 13px; text-align: center; }
  .toast.show { display: block; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="nav-bar"><a class="back" href="observation-evaluation.html">‹</a>开始评价</div>
  <main class="scroll">
    <form class="form-card" id="evalForm">
      <div class="field">
        <label for="child">幼儿姓名</label>
        <input id="child" value="林一诺">
      </div>
      <div class="field">
        <label for="activity">观察活动</label>
        <input id="activity" value="建构区合作搭建">
      </div>
      <div class="field">
        <label for="domain">评价维度</label>
        <select id="domain">
          <option>社会交往与合作</option>
          <option>语言表达</option>
          <option>探究能力</option>
          <option>动作发展</option>
          <option>艺术表现</option>
        </select>
      </div>
      <div class="field">
        <label for="note">观察笔记</label>
        <textarea id="note">幼儿在搭建祠堂屋顶时主动邀请同伴一起分工，能说明自己选择长木板的原因。遇到结构不稳时，先观察同伴做法，再尝试增加支撑材料，表现出较好的合作意识和问题解决能力。</textarea>
      </div>
      <div class="field">
        <label>拍摄照片</label>
        <div class="photo-grid">
          <label class="photo-box"><span>上传照片</span><input type="file" accept="image/*"></label>
          <label class="photo-box"><span>拍摄照片</span><input type="file" accept="image/*" capture="environment"></label>
          <label class="photo-box"><span>补充照片</span><input type="file" accept="image/*"></label>
        </div>
      </div>
      <button class="submit" type="submit">保存评价</button>
      <div class="toast" id="toast">评价已保存，可在过往评价中查看。</div>
    </form>
  </main>
</div>
<script>
  document.querySelectorAll('.photo-box input').forEach(function(input){
    input.addEventListener('change', function(){
      var box = input.closest('.photo-box');
      box.classList.add('filled');
      box.querySelector('span').textContent = '已添加';
    });
  });
  document.getElementById('evalForm').addEventListener('submit', function(event){
    event.preventDefault();
    document.getElementById('toast').classList.add('show');
  });
</script>
</body></html>
