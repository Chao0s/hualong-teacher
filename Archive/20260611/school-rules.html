<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no">
<title>园所制度 · 幼儿园教师端</title>
<style>
  :root {
    --bg: #f0f5f5; --surface: #ffffff; --fg: #1a1916;
    --muted: #868686; --border: #e0e8e8; --accent: #189b91;
    --accent-dark: #067e76; --accent-light: #e8f5f4;
    --green: #4b9a5a; --green-light: #eaf5ed;
    --red: #dc2626; --blue: #3388fc;
    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
    --radius: 12px; --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; display: flex; justify-content: center; background: transparent; font-family: var(--font); color: var(--fg); -webkit-font-smoothing: antialiased; }
  .phone { width: 390px; height: 844px; overflow: hidden; position: relative; border-radius: 40px; background: var(--bg); }
  .status-bar { height: 36px; display: flex; justify-content: space-between; align-items: end; padding: 0 28px 6px; font-size: 13px; font-weight: 600; }
  .nav { height: 50px; display: grid; grid-template-columns: 40px 1fr 78px; align-items: center; padding: 0 14px; }
  .back { width: 34px; height: 34px; border: 0; background: transparent; color: var(--fg); display: grid; place-items: center; text-decoration: none; }
  .back svg { width: 24px; height: 24px; }
  .title { text-align: center; font-size: 18px; font-weight: 750; }
  .mini-menu { width: 74px; height: 30px; border: 1px solid var(--border); border-radius: 999px; display: flex; justify-content: space-around; align-items: center; color: var(--fg); background: var(--surface); }
  .scroll { height: calc(100% - 86px); overflow-y: auto; padding: 0 16px 96px; }
  .scroll::-webkit-scrollbar { display: none; }
  .search { height: 44px; margin: 8px 0 14px; border-radius: 24px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 0 16px; color: var(--muted); }
  .search svg { width: 18px; height: 18px; flex: 0 0 auto; }
  .search input { width: 100%; border: 0; outline: 0; background: transparent; color: var(--fg); font: 14px var(--font); }
  .search input::placeholder { color: var(--muted); }
  .tabs-filter { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
  .tabs-filter::-webkit-scrollbar { display: none; }
  .filter { border: 1px solid var(--border); white-space: nowrap; height: 32px; padding: 0 14px; border-radius: 999px; background: var(--surface); color: var(--fg); font: 13px var(--font); font-weight: 600; }
  .filter.active { background: var(--accent-light); border-color: color-mix(in oklab, var(--accent), white 72%); color: var(--accent-dark); }
  .notice { display: grid; grid-template-columns: 42px 1fr; gap: 12px; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
  .notice-icon { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; background: var(--accent-light); color: var(--accent); }
  .notice-icon svg { width: 23px; height: 23px; }
  .notice h2 { font-size: 15px; line-height: 1.35; color: var(--fg); font-weight: 700; }
  .notice p { margin-top: 4px; font-size: 12px; color: var(--muted); line-height: 1.4; }
  .file-list { display: grid; gap: 6px; }
  .file-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 10px 0; display: grid; grid-template-columns: 38px minmax(0,1fr) 22px; column-gap: 10px; row-gap: 8px; align-items: start; overflow: hidden; }
  .file-card[hidden] { display: none; }
  .file-type { width: 34px; height: 40px; border-radius: 6px; display: grid; place-items: center; color: #fff; font-size: 11px; font-weight: 850; position: relative; margin-top: 1px; }
  .file-type::after { content: ""; position: absolute; top: 0; right: 0; border-top: 10px solid rgba(255,255,255,.5); border-left: 10px solid transparent; }
  .pdf { background: var(--red); } .word { background: var(--blue); }
  .file-main { min-width: 0; padding-top: 1px; }
  .file-title { font-size: 14px; font-weight: 750; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { margin-top: 4px; font-size: 12px; color: var(--muted); display: grid; grid-template-columns: auto auto 1px minmax(0,1fr); column-gap: 6px; align-items: center; white-space: nowrap; }
  .file-meta .meta-divider { width: 1px; height: 10px; background: var(--border); }
  .file-meta .owner { overflow: hidden; text-overflow: ellipsis; }
  .more { color: var(--muted); font-size: 21px; line-height: 1; text-align: right; padding-top: 1px; }
  .actions { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1px 1fr; align-items: center; border-top: 1px solid var(--border); min-height: 38px; margin: 0 -10px; }
  .actions button { border: 0; background: transparent; color: var(--accent-dark); font: 13px var(--font); font-weight: 700; height: 38px; display: grid; place-items: center; }
  .divider { width: 1px; height: 20px; background: var(--border); }
  .empty { display: none; text-align: center; color: var(--muted); font-size: 13px; padding: 28px 0; }
  .empty.show { display: block; }
  .tabs { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; display: flex; justify-content: space-around; align-items: center; padding: 8px 8px 26px; background: var(--surface); border-top: 1px solid var(--border); }
  .tabs a { display: flex; flex-direction: column; align-items: center; gap: 2px; text-decoration: none; color: var(--muted); font-size: 10px; padding: 4px; }
  .tabs a.on { color: var(--accent); font-weight: 700; }
  .tabs svg { width: 22px; height: 22px; }
  .toast { position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%) translateY(12px); background: rgba(23,35,32,.92); color: #fff; font-size: 13px; padding: 9px 14px; border-radius: 999px; opacity: 0; pointer-events: none; transition: .18s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮</span></div>
  <header class="nav">
    <a class="back" href="school-affairs.html" aria-label="返回园务中心"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 19l-7-7 7-7"></path></svg></a>
    <div class="title">园所制度</div>
    <div class="mini-menu"><span>•••</span><span>○</span></div>
  </header>

  <main class="scroll">
    <label class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M16.5 16.5L21 21"></path></svg>
      <input id="searchInput" type="search" placeholder="搜索制度名称、关键词、文件类型" autocomplete="off">
    </label>

    <div class="tabs-filter" role="tablist" aria-label="制度分类">
      <button class="filter active" data-filter="all" type="button">全部</button>
      <button class="filter" data-filter="安全管理" type="button">安全管理</button>
      <button class="filter" data-filter="班级管理" type="button">班级管理</button>
      <button class="filter" data-filter="教师规范" type="button">教师规范</button>
    </div>

    

    <section class="file-list" id="fileList" aria-label="园所制度文件">
      <article class="file-card" data-cat="安全管理" data-text="幼儿园工作规程 pdf 安全 管理 规范">
        <div class="file-type pdf">PDF</div>
        <div class="file-main"><div class="file-title">幼儿园工作规程.pdf</div><div class="file-meta"><span>05-20</span><span>14:30</span><span class="meta-divider"></span><span class="owner">张老师</span></div></div>
        <div class="more">•••</div>
        <div class="actions"><button type="button" data-action="预览">预览</button><div class="divider"></div><button type="button" data-action="下载">下载</button></div>
      </article>
      <article class="file-card" data-cat="班级管理" data-text="班级管理规范 pdf 班级 常规 一日流程">
        <div class="file-type pdf">PDF</div>
        <div class="file-main"><div class="file-title">班级管理规范.pdf</div><div class="file-meta"><span>05-14</span><span>11:05</span><span class="meta-divider"></span><span class="owner">陈老师</span></div></div>
        <div class="more">•••</div>
        <div class="actions"><button type="button" data-action="预览">预览</button><div class="divider"></div><button type="button" data-action="下载">下载</button></div>
      </article>
      <article class="file-card" data-cat="教师规范" data-text="教师值班制度 docx 教师 值班 交接">
        <div class="file-type word">W</div>
        <div class="file-main"><div class="file-title">教师值班制度.docx</div><div class="file-meta"><span>05-12</span><span>16:20</span><span class="meta-divider"></span><span class="owner">李老师</span></div></div>
        <div class="more">•••</div>
        <div class="actions"><button type="button" data-action="预览">预览</button><div class="divider"></div><button type="button" data-action="下载">下载</button></div>
      </article>
      <article class="file-card" data-cat="安全管理" data-text="卫生保健制度 pdf 卫生 保健 晨检">
        <div class="file-type pdf">PDF</div>
        <div class="file-main"><div class="file-title">卫生保健制度.pdf</div><div class="file-meta"><span>05-10</span><span>09:30</span><span class="meta-divider"></span><span class="owner">王老师</span></div></div>
        <div class="more">•••</div>
        <div class="actions"><button type="button" data-action="预览">预览</button><div class="divider"></div><button type="button" data-action="下载">下载</button></div>
      </article>
      <article class="file-card" data-cat="教师规范" data-text="教师考勤与请假制度 pdf 教师 考勤 请假">
        <div class="file-type pdf">PDF</div>
        <div class="file-main"><div class="file-title">教师考勤与请假制度.pdf</div><div class="file-meta"><span>05-08</span><span>10:00</span><span class="meta-divider"></span><span class="owner">园务办</span></div></div>
        <div class="more">•••</div>
        <div class="actions"><button type="button" data-action="预览">预览</button><div class="divider"></div><button type="button" data-action="下载">下载</button></div>
      </article>
    </section>
    <div class="empty" id="empty">暂无匹配制度文件</div>
  </main>

  <div class="tabs">
    <a href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg><span>首页</span></a>
    <a class="on" href="school-affairs.html"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg><span>党建管理</span></a>
    <a href="comprehensive-coordination.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h10"/><circle cx="18" cy="18" r="2"/></svg><span>综合协调</span></a>
    <a href="training-center.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="5"></circle><path d="M5 21v-3a7 7 0 0114 0v3"></path></svg><span>教研培训</span></a>
    <a href="home-school.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 00-3-3.87"></path><path d="M16 3.13a4 4 0 010 7.75"></path></svg><span>家园共育</span></a>
  </div>
  <div class="toast" id="toast">已准备文件</div>
</div>

<script>
  const filters = Array.from(document.querySelectorAll('.filter'));
  const cards = Array.from(document.querySelectorAll('.file-card'));
  const input = document.getElementById('searchInput');
  const empty = document.getElementById('empty');
  let active = 'all';

  function applyFilter() {
    const q = input.value.trim().toLowerCase();
    let visible = 0;
    cards.forEach(card => {
      const matchTab = active === 'all' || card.dataset.cat === active;
      const matchText = !q || card.dataset.text.toLowerCase().includes(q);
      const show = matchTab && matchText;
      card.hidden = !show;
      if (show) visible += 1;
    });
    empty.classList.toggle('show', visible === 0);
  }

  filters.forEach(btn => btn.addEventListener('click', () => {
    active = btn.dataset.filter;
    filters.forEach(item => item.classList.toggle('active', item === btn));
    applyFilter();
  }));
  input.addEventListener('input', applyFilter);

  document.querySelectorAll('[data-action]').forEach(button => {
    button.addEventListener('click', () => {
      const card = button.closest('.file-card');
      const title = card.querySelector('.file-title').textContent;
      const toast = document.getElementById('toast');
      toast.textContent = `${button.dataset.action}：${title}`;
      toast.classList.add('show');
      window.clearTimeout(window.__toastTimer);
      window.__toastTimer = window.setTimeout(() => toast.classList.remove('show'), 1400);
    });
  });
</script>


</body></html>
