<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no">
<title>统计评价 · 幼儿园教师端</title>
<style>
  :root {
    --bg: #f0f5f5; --surface: #ffffff; --fg: #1a1916;
    --muted: #868686; --border: #e0e8e8; --accent: #189b91;
    --accent-dark: #067e76; --accent-light: #e8f5f4;
    --green: #4b9a5a; --green-light: #eaf5ed;
    --amber: #feaf06; --amber-light: #fff7e3;
    --blue: #3388fc; --blue-light: #e8f2fe;
    --orange: #f6762f; --violet: #8064e9; --violet-light: #f0edff;
    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
    --radius: 12px; --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; background: transparent; font-family: var(--font); color: var(--fg); -webkit-font-smoothing: antialiased; }
  .phone { width: 390px; height: 844px; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; border-radius: 40px; position: relative; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 28px 8px; font-size: 13px; font-weight: 600; background: var(--bg); }
  .nav-bar { display: flex; align-items: center; justify-content: center; padding: 8px 20px 12px; font-size: 17px; font-weight: 600; background: var(--bg); position: relative; }
  .back { position: absolute; left: 16px; top: 7px; width: 30px; height: 30px; display: grid; place-items: center; color: var(--accent); text-decoration: none; font-size: 20px; }
  .scroll { flex: 1; overflow-y: auto; padding: 0 16px 24px; }
  .scroll::-webkit-scrollbar { display: none; }

  .chunk { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
  .chunk h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

    .date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding: 10px 12px; border-radius: var(--radius-sm); background: #f9fcfb; }
  .date-row span { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .date-row input { flex: 1; min-width: 0; height: 32px; border: 1px solid var(--border); border-radius: 6px; padding: 0 8px; font-size: 12px; font-family: var(--font); color: var(--fg); background: var(--surface); }
  .date-sep { flex-shrink: 0; font-size: 12px; color: var(--muted); }
  .pie-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .pie { width: 160px; height: 160px; border-radius: 50%; flex-shrink: 0; }
  .pie-loc { background: conic-gradient(var(--accent) 0deg 154.3deg, var(--blue) 154.3deg 257.1deg, var(--green) 257.1deg 321.4deg, var(--orange) 321.4deg 360deg); }
  .pie-dom { background: conic-gradient(var(--accent) 0deg 115.7deg, var(--blue) 115.7deg 205.7deg, var(--green) 205.7deg 270deg, var(--orange) 270deg 321.4deg, var(--violet) 321.4deg 360deg); }
  .pie-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; width: 100%; }
  .pie-legend.col3 { grid-template-columns: 1fr 1fr 1fr; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .leg-dot.a { background: var(--accent); } .leg-dot.b { background: var(--blue); } .leg-dot.c { background: var(--green); } .leg-dot.d { background: var(--orange); } .leg-dot.e { background: var(--violet); }
  .leg-name { color: var(--fg); } .leg-pct { color: var(--muted); margin-left: auto; }

  .cover-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .cover-item { padding: 14px 12px; border-radius: var(--radius-sm); text-align: center; }
  .cover-item.done { background: var(--accent-light); }
  .cover-item.left { background: var(--amber-light); }
  .cover-num { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -.02em; }
  .cover-item.done .cover-num { color: var(--accent); }
  .cover-item.left .cover-num { color: var(--amber); }
  .cover-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .bar-row { margin-bottom: 12px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .bar-name { font-size: 13px; font-weight: 600; }
  .bar-count { font-size: 12px; color: var(--muted); }
  .bar-track { height: 8px; border-radius: 999px; background: #f0f0f0; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 999px; }
  .bar-fill.a { background: var(--accent); }
  .bar-fill.b { background: var(--blue); }
  .bar-fill.c { background: var(--green); }
  .bar-fill.d { background: var(--orange); }
  .bar-fill.e { background: var(--violet); }

  .loc-list { display: grid; gap: 1px; }
  .loc-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; min-height: 44px; padding: 10px 0; }
  .loc-row + .loc-row { border-top: 1px solid var(--border); }
  .loc-name { font-size: 13px; font-weight: 600; }
  .loc-stat { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="nav-bar"><a class="back" href="observation-evaluation.html">‹</a>统计评价</div>
  <main class="scroll">

    <section class="chunk">
      <h2>幼儿覆盖</h2>
      <div class="date-row">
        <span>分析范围</span>
        <input type="date" value="2026-05-20" aria-label="开始日期">
        <span class="date-sep">—</span>
        <input type="date" value="2026-06-12" aria-label="结束日期">
      </div>
      <div class="cover-grid">
        <div class="cover-item done">
          <div class="cover-num">18</div>
          <div class="cover-label">已覆盖幼儿</div>
        </div>
        <div class="cover-item left">
          <div class="cover-num">8</div>
          <div class="cover-label">待评价幼儿</div>
        </div>
      </div>
      <div class="bar-row">
        <div class="bar-info"><span class="bar-name">全班 26 人</span><span class="bar-count">69%</span></div>
        <div class="bar-track"><div class="bar-fill a" style="width:69%"></div></div>
      </div>
    </section>

    <section class="chunk">
      <h2>观察地点分布</h2>
      <div class="pie-wrap">
        <div class="pie pie-loc"></div>
        <div class="pie-legend">
          <div class="leg-item"><span class="leg-dot a"></span><span class="leg-name">活动室</span><span class="leg-pct">42.9%</span></div>
          <div class="leg-item"><span class="leg-dot b"></span><span class="leg-name">操场</span><span class="leg-pct">28.6%</span></div>
          <div class="leg-item"><span class="leg-dot c"></span><span class="leg-name">功能室</span><span class="leg-pct">17.9%</span></div>
          <div class="leg-item"><span class="leg-dot d"></span><span class="leg-name">户外游戏区</span><span class="leg-pct">10.7%</span></div>
        </div>
      </div>
    </section>

    <section class="chunk">
      <h2>领域发展分布</h2>
      <div class="pie-wrap">
        <div class="pie pie-dom"></div>
        <div class="pie-legend col3">
          <div class="leg-item"><span class="leg-dot a"></span><span class="leg-name">语言</span><span class="leg-pct">32.1%</span></div>
          <div class="leg-item"><span class="leg-dot b"></span><span class="leg-name">社会</span><span class="leg-pct">25.0%</span></div>
          <div class="leg-item"><span class="leg-dot c"></span><span class="leg-name">艺术</span><span class="leg-pct">17.9%</span></div>
          <div class="leg-item"><span class="leg-dot d"></span><span class="leg-name">科学</span><span class="leg-pct">14.3%</span></div>
          <div class="leg-item"><span class="leg-dot e"></span><span class="leg-name">健康</span><span class="leg-pct">10.7%</span></div>
        </div>
      </div>
    </section>

    <div style="height:12px"></div>
  </main>
</div>
</body></html>
