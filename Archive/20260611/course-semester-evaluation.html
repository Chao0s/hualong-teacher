<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no" />
<title>学期评价 · 课程建设</title>
<style>
  :root {
    --bg:#f0f5f5; --surface:#fff; --fg:#1a1916; --muted:#868686; --border:#e0e8e8;
    --accent:#189b91; --accent-dark:#067e76; --accent-light:#e8f5f4;
    --green:#4b9a5a; --green-light:#eaf5ed; --amber:#feaf06; --amber-light:#fff7e3; --red:#e05243; --red-light:#fff0ed;
    --font:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{display:flex;justify-content:center;min-height:100vh;background:transparent;font-family:var(--font);color:var(--fg);-webkit-font-smoothing:antialiased}
  .phone{width:390px;height:844px;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;border-radius:40px;position:relative}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 8px;font-size:13px;font-weight:600}
  .nav-bar{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;padding:8px 12px 12px}
  .nav-bar a{display:grid;place-items:center;width:36px;height:36px;color:var(--fg);text-decoration:none}.nav-title{text-align:center;font-size:17px;font-weight:600}
  .scroll{flex:1;overflow-y:auto;padding:0 16px 28px}.scroll::-webkit-scrollbar{display:none}
  .chunk{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px}
  .start{display:flex;align-items:center;justify-content:space-between;gap:12px}.start h2{font-size:16px;margin-bottom:6px}.start p{font-size:12px;color:var(--muted);line-height:1.5}
  .btn{border:0;border-radius:999px;background:var(--accent);color:#fff;padding:9px 14px;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap}
  .sec{font-size:16px;font-weight:700;margin:18px 0 10px}
  .progress-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;margin-bottom:10px}.percent{font-weight:800;color:var(--accent-dark)}
  .bar{height:9px;border-radius:999px;background:var(--accent-light);overflow:hidden}.bar span{display:block;height:100%;width:68%;background:var(--accent)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.stat{border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}.num{font-size:18px;font-weight:800}.label{font-size:11px;color:var(--muted);margin-top:3px}
  .student{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:11px 12px;margin-bottom:8px}
  .name{font-size:14px;font-weight:700}.sub{font-size:11px;color:var(--muted);margin-top:3px}.pill{font-size:11px;border-radius:999px;padding:4px 8px;font-weight:700}
  .done{background:var(--green-light);color:var(--green)}.draft{background:var(--amber-light);color:#a35e00}.miss{background:var(--red-light);color:var(--red)}
  .small-btn{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:5px 9px;font-size:11px;color:var(--fg)}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="nav-bar">
    <a href="course-building.html" aria-label="返回课程建设"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
    <div class="nav-title">学期评价</div>
    <span></span>
  </div>
  <div class="scroll">
    <section class="chunk start">
      <div>
        <h2>开始评价</h2>
        <p>选择幼儿后填写五大领域表现、课程参与记录和综合评语。</p>
      </div>
      <a class="btn" href="teacher-term-form.html">开始</a>
    </section>

    <div class="sec">班级进度</div>
    <section class="chunk">
      <div class="progress-row"><span>中二班 · 2026 春季学期</span><span class="percent">68%</span></div>
      <div class="bar"><span></span></div>
      <div class="stats">
        <div class="stat"><div class="num">17</div><div class="label">已完成</div></div>
        <div class="stat"><div class="num">5</div><div class="label">草稿</div></div>
        <div class="stat"><div class="num">3</div><div class="label">未开始</div></div>
      </div>
    </section>

    <div class="sec">各人进度</div>
    <div class="student"><div><div class="name">陈小明</div><div class="sub">健康、社会、科学已完成</div></div><span class="pill done">已完成</span><button class="small-btn">查看</button></div>
    <div class="student"><div><div class="name">李雨萱</div><div class="sub">艺术领域待补充照片</div></div><span class="pill draft">草稿</span><button class="small-btn">继续</button></div>
    <div class="student"><div><div class="name">张力轩</div><div class="sub">尚未开始填写</div></div><span class="pill miss">未开始</span><button class="small-btn">添加</button></div>
    <div class="student"><div><div class="name">王子涵</div><div class="sub">五大领域与综合评语已完成</div></div><span class="pill done">已完成</span><button class="small-btn">查看</button></div>
    <div class="student"><div><div class="name">赵佳怡</div><div class="sub">语言、艺术领域待补充</div></div><span class="pill draft">草稿</span><button class="small-btn">继续</button></div>
  </div>
</div>
</body>
</html>
