<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=390, initial-scale=1, user-scalable=no">
<title>观察评价 · 幼儿园教师端</title>
<style>
  :root {
    --bg: #f0f5f5; --surface: #ffffff; --fg: #1a1916;
    --muted: #868686; --border: #e0e8e8; --accent: #189b91;
    --accent-dark: #067e76; --accent-light: #e8f5f4;
    --green: #4b9a5a; --green-light: #eaf5ed;
    --amber: #feaf06; --orange: #f6762f;
    --blue: #3388fc; --blue-light: #e8f2fe;
    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
    --radius: 12px; --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; background: transparent; font-family: var(--font); color: var(--fg); -webkit-font-smoothing: antialiased; }
  .phone { width: 390px; height: 844px; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; border-radius: 40px; position: relative; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 28px 8px; font-size: 13px; font-weight: 600; background: var(--bg); }
  .nav-bar { display: flex; align-items: center; justify-content: center; padding: 8px 20px 12px; font-size: 17px; font-weight: 600; background: var(--bg); position: relative; }
  .back { position: absolute; left: 16px; top: 7px; width: 30px; height: 30px; display: grid; place-items: center; color: var(--accent); text-decoration: none; font-size: 20px; }
  .scroll { flex: 1; overflow-y: auto; padding: 0 16px 24px; scroll-behavior: smooth; }
  .scroll::-webkit-scrollbar { display: none; }
  .start-card { display: block; text-decoration: none; color: inherit; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 18px; }
  .start-top { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
  .start-icon { width: 48px; height: 48px; border-radius: 16px; display: grid; place-items: center; background: var(--accent-light); color: var(--accent-dark); font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .start-copy { flex: 1; min-width: 0; }
  .start-copy h2 { font-size: 18px; line-height: 1.25; font-weight: 700; }
  .start-copy p { margin-top: 5px; font-size: 12px; color: var(--muted); line-height: 1.45; }
  .start-action { margin-top: 16px; height: 42px; border-radius: 12px; display: grid; place-items: center; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; }
  .sec { font-size: 16px; font-weight: 600; margin: 0 0 10px; }
  .eval-list { display: grid; gap: 7px; }
  .eval-item { display: block; text-decoration: none; color: inherit; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 14px; }
  .item-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .item-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-date { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .item-meta { display: flex; gap: 7px; margin-top: 8px; flex-wrap: wrap; }
  .tag { display: inline-flex; align-items: center; height: 22px; padding: 0 8px; border-radius: 999px; background: var(--accent-light); color: var(--accent-dark); font-size: 11px; font-weight: 500; }
  .item-summary { margin-top: 8px; font-size: 12px; line-height: 1.45; color: var(--muted); }

  .stats-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 18px; }
  .stats-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .stats-head h3 { font-size: 15px; font-weight: 700; }
  .stats-link { color: var(--accent); font-size: 12px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 3px; }
  .stats-link:active { opacity: .6; }
    .stats-date { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .stats-date span { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .stats-date input { flex: 1; min-width: 0; height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 8px; font-size: 12px; font-family: var(--font); color: var(--fg); background: #f9fcfb; }
  .date-sep { flex-shrink: 0; font-size: 12px; color: var(--muted); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-item { padding: 12px; border-radius: var(--radius-sm); background: #f9fcfb; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 800; line-height: 1; letter-spacing: -.02em; }
  .stat-num.done { color: var(--accent); }
  .stat-num.left { color: var(--amber); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 5px; }
  .stat-bar-wrap { margin-top: 14px; }
  .stat-bar-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .stat-bar { height: 6px; border-radius: 999px; background: var(--border); overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 999px; background: var(--accent); }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px">WiFi · ▮▮▮▮</span></div>
  <div class="nav-bar"><a class="back" href="training-center.html">‹</a>观察评价</div>
  <main class="scroll">
    <a class="start-card" href="observation-evaluation-form.html">
      <div class="start-top">
        <div class="start-icon">评</div>
        <div class="start-copy">
          <h2>开始记录</h2>
          <p>记录活动现场观察笔记、上传照片，并生成幼儿成长评价。</p>
        </div>
      </div>
      <div class="start-action">进入填写</div>
    </a>

    <section class="stats-card">
      <div class="stats-head">
        <h3>统计评价</h3>
        <a class="stats-link" href="observation-evaluation-stats.html">详细分析 ›</a>
      </div>
      <div class="stats-date">
        <span>范围</span>
        <input type="date" value="2026-05-20" aria-label="开始日期">
        <span class="date-sep">—</span>
        <input type="date" value="2026-06-12" aria-label="结束日期">
      </div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-num done">18</div>
          <div class="stat-label">已覆盖幼儿</div>
        </div>
        <div class="stat-item">
          <div class="stat-num left">8</div>
          <div class="stat-label">待评价幼儿</div>
        </div>
      </div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-info"><span>全班 26 人</span><span>覆盖率 69%</span></div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:69%"></div></div>
      </div>
    </section>

    <div class="sec">过往评价</div>
    <div class="eval-list">
      <a class="eval-item" href="observation-evaluation-detail.html">
        <div class="item-head"><div class="item-title">建构区合作行为观察</div><div class="item-date">6月11日</div></div>
        <div class="item-meta"><span class="tag">大班</span><span class="tag">社会</span><span class="tag">区域活动</span></div>
        <div class="item-summary">幼儿能主动协商搭建任务，并在材料不足时尝试提出替代方案。</div>
      </a>
      <a class="eval-item" href="observation-evaluation-detail.html">
        <div class="item-head"><div class="item-title">龙舟主题探究活动记录</div><div class="item-date">6月6日</div></div>
        <div class="item-meta"><span class="tag">中班</span><span class="tag">语言</span><span class="tag">主题探究</span></div>
        <div class="item-summary">幼儿能围绕龙舟经验进行讲述，愿意倾听同伴补充信息。</div>
      </a>
      <a class="eval-item" href="observation-evaluation-detail.html">
        <div class="item-head"><div class="item-title">美工区材料选择观察</div><div class="item-date">5月28日</div></div>
        <div class="item-meta"><span class="tag">小班</span><span class="tag">艺术</span><span class="tag">区域活动</span></div>
        <div class="item-summary">幼儿能根据想法选择颜色和材料，持续操作时间较上月有提升。</div>
      </a>
    </div>
  </main>
</div>

</body></html>
