<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>文件列表 · 幼儿园教师端</title>
<style>
  :root {
    --bg: #f5f4f1; --surface: #ffffff; --fg: #1a1916; --muted: #8c8a84;
    --border: #e8e5df; --accent: #2f6feb;
    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; background: #e8e6e0;
    font-family: var(--font); color: var(--fg); -webkit-font-smoothing: antialiased;
  }
  .phone {
    width: 390px; min-height: 844px; background: var(--bg);
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.15); border-radius: 40px; margin: 20px;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px 8px; font-size: 13px; font-weight: 600;
  }
  .nav-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px 12px; font-size: 17px; font-weight: 600;
  }
  .back-btn {
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 8px; border: none; background: none;
    font-size: 18px; color: var(--accent); font-family: var(--font);
    text-decoration: none;
  }
  .main-scroll { flex: 1; overflow-y: auto; padding: 0 16px 20px; }
  .main-scroll::-webkit-scrollbar { display: none; }
  .file-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px; background: var(--surface); border-radius: 12px;
    margin-bottom: 8px; cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,.03);
  }
  .file-row:active { background: #f8f8f6; }
  .file-icon {
    width: 40px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    background: #f0f4ff; color: var(--accent); font-weight: 600;
  }
  .file-body { flex: 1; min-width: 0; }
  .file-body .name { font-size: 14px; font-weight: 500; }
  .file-body .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .btn-sm {
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); font-size: 12px; font-family: var(--font);
    color: var(--fg); cursor: pointer; transition: .15s; text-decoration: none;
  }
  .btn-sm.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-sm:active { transform: translateY(1px); }
  #previewModal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 100; justify-content: center; align-items: center;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span style="font-size:12px;opacity:.6;">WiFi · 电池</span></div>
  <div class="nav-bar">
    <a class="back-btn" href="school-affairs.html">←</a>
    <span id="catTitle">党建学习</span>
  </div>

  <div class="main-scroll" id="fileList">
    <!-- Populated by JS -->
  </div>

  <!-- Preview Modal -->
  <div id="previewModal" onclick="if(event.target===this)this.style.display='none'">
    <div style="width:340px;max-height:560px;background:var(--surface);border-radius:20px;padding:24px;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 style="font-size:16px;" id="previewTitle">文件预览</h3>
        <button onclick="document.getElementById('previewModal').style.display='none'" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);">&times;</button>
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:20px;margin-bottom:16px;">
        <p style="font-size:14px;line-height:1.7;color:var(--fg);" id="previewContent"></p>
      </div>
      <button class="btn-sm primary" style="width:100%;padding:10px;font-size:14px;">下载文件</button>
    </div>
  </div>
</div>

<script>
  const data = {
    dangjian: {
      title: '党建学习',
      files: [
        { name: '党支部六月份学习材料', meta: '党支部 · 2026年6月 · PDF', icon: 'PDF' },
        { name: '2026年党建工作要点', meta: '园党支部 · 2026年1月 · PDF', icon: 'PDF' },
        { name: '党员教师先锋岗创建方案', meta: '党支部 · 2026年3月 · DOC', icon: 'DOC' },
        { name: '学习贯彻党的教育方针专题材料', meta: '市教育局 · 2025年12月 · PDF', icon: 'PDF' },
        { name: '幼儿园党支部年度工作总结', meta: '党支部 · 2025年12月 · DOC', icon: 'DOC' },
      ]
    },
    zhengce: {
      title: '政策学习',
      files: [
        { name: '广东省学前教育政策汇编（2026版）', meta: '省教育厅 · 2026年1月 · PDF', icon: 'PDF' },
        { name: '幼儿园保育教育质量评估指南', meta: '教育部 · 2025年修订 · PDF', icon: 'PDF' },
        { name: '3-6岁儿童学习与发展指南', meta: '教育部 · PDF', icon: 'PDF' },
        { name: '幼儿园教师专业标准（试行）', meta: '教育部 · PDF', icon: 'PDF' },
      ]
    },
    zhidu: {
      title: '园所制度',
      files: [
        { name: '幼儿园教师师德考核办法', meta: '园务办公室 · 2026年3月 · DOC', icon: 'DOC' },
        { name: '幼儿园安全工作管理制度', meta: '后勤保障部 · 2026年1月 · PDF', icon: 'PDF' },
        { name: '幼儿一日生活作息制度', meta: '教研组 · 2025年9月 · DOC', icon: 'DOC' },
        { name: '教师考勤与请假制度', meta: '园务办公室 · 2025年8月 · PDF', icon: 'PDF' },
        { name: '家长开放日工作规范', meta: '教研组 · 2025年10月 · DOC', icon: 'DOC' },
      ]
    },
    houqin: {
      title: '后勤保障',
      files: [
        { name: '2026年暑期安全工作通知', meta: '后勤保障部 · 2026年6月 · PDF', icon: 'PDF' },
        { name: '幼儿园食品安全管理规范', meta: '后勤保障部 · 2026年3月 · PDF', icon: 'PDF' },
        { name: '设施设备安全检查记录表', meta: '后勤保障部 · 2026年5月 · DOC', icon: 'DOC' },
      ]
    },
    recent: {
      title: '最近更新',
      files: [
        { name: '2026年暑期安全工作通知', meta: '后勤保障部 · 2026年6月9日 · PDF', icon: 'PDF' },
        { name: '幼儿园教师师德考核办法', meta: '园务办公室 · 2026年6月5日 · DOC', icon: 'DOC' },
        { name: '广东省学前教育政策汇编（2026版）', meta: '省教育厅 · 2026年6月1日 · PDF', icon: 'PDF' },
        { name: '党支部六月份学习材料', meta: '党支部 · 2026年5月30日 · PDF', icon: 'PDF' },
        { name: '设施设备安全检查记录表', meta: '后勤保障部 · 2026年5月20日 · DOC', icon: 'DOC' },
        { name: '幼儿一日生活作息制度（修订版）', meta: '教研组 · 2026年5月15日 · DOC', icon: 'DOC' },
      ]
    }
  };

  const params = new URLSearchParams(window.location.search);
  const cat = params.get('cat') || 'dangjian';
  const d = data[cat] || data.dangjian;

  document.getElementById('catTitle').textContent = d.title;
  const list = document.getElementById('fileList');

  d.files.forEach(f => {
    const row = document.createElement('div');
    row.className = 'file-row';
    row.innerHTML = `
      <div class="file-icon">${f.icon}</div>
      <div class="file-body"><div class="name">${f.name}</div><div class="meta">${f.meta}</div></div>
      <a class="btn-sm primary" href="#" onclick="event.stopPropagation();preview('${f.name}')">预览</a>
      <a class="btn-sm" href="#" onclick="event.stopPropagation();">下载</a>
    `;
    row.addEventListener('click', () => preview(f.name));
    list.appendChild(row);
  });

  function preview(name) {
    document.getElementById('previewTitle').textContent = name;
    document.getElementById('previewContent').textContent = `「${name}」的文件内容预览区域。此处将展示文件正文内容，支持 PDF、DOC 等格式在线预览。完整版本请点击下方"下载文件"获取。`;
    document.getElementById('previewModal').style.display = 'flex';
  }
</script>
</body>
</html>
