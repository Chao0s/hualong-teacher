<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>化龙电子资源平台交互地图</title>
  <style>
    :root {
      --bg: #080b10;
      --ink: #f4f7fb;
      --muted: #9aa4b2;
      --line: #263241;
      --panel: #111722;
      --teacher: #22c7a8;
      --parent: #ff9f43;
      --admin: #a78bfa;
      --accent: #f4c430;
      --soft: #172231;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(8,11,16,0.98), rgba(9,13,20,0.94)),
        repeating-linear-gradient(90deg, rgba(244,247,251,0.035) 0 1px, transparent 1px 40px);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
    }

    button, input { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      border-right: 1px solid var(--line);
      background: rgba(13, 18, 27, 0.94);
      backdrop-filter: blur(12px);
      padding: 22px;
      overflow: auto;
    }

    main {
      min-width: 0;
      padding: 22px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .entry-tabs,
    .mode-tabs {
      display: grid;
      gap: 8px;
    }

    .entry-tabs {
      grid-template-columns: 1fr;
      margin-bottom: 18px;
    }

    .mode-tabs {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .tab,
    .module-button,
    .chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }

    .tab {
      min-height: 42px;
      border-radius: 8px;
      padding: 8px 10px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .tab:hover,
    .module-button:hover,
    .chip:hover { transform: translateY(-1px); }

    .tab.active {
      background: var(--accent);
      color: #16130a;
      border-color: var(--accent);
    }

    .tab .port {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .port.teacher { background: var(--teacher); }
    .port.parent { background: var(--parent); }
    .port.admin { background: var(--admin); }

    .side-section {
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .side-section h2 {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .module-list {
      display: grid;
      gap: 8px;
    }

    .module-button {
      width: 100%;
      min-height: 44px;
      border-radius: 8px;
      padding: 9px 10px;
      text-align: left;
      display: grid;
      gap: 3px;
    }

    .module-button.active {
      border-color: currentColor;
      background: var(--soft);
    }

    .module-button strong {
      font-size: 15px;
      line-height: 1.25;
    }

    .module-button span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(190px, 1fr) auto auto;
      gap: 12px;
      align-items: center;
    }

    .search {
      min-height: 42px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: rgba(17, 23, 34, 0.96);
      color: var(--ink);
    }

    .search::placeholder { color: #788596; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .chip {
      min-height: 36px;
      border-radius: 999px;
      padding: 6px 12px;
      color: var(--muted);
    }

    .chip.active {
      color: #16130a;
      background: var(--accent);
      border-color: var(--accent);
    }

    .zoom-controls {
      display: inline-grid;
      grid-auto-flow: column;
      grid-auto-columns: 38px;
      align-items: center;
      gap: 6px;
    }

    .zoom-button {
      width: 38px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }

    .zoom-button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .zoom-readout {
      min-width: 54px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
    }

    .canvas-wrap,
    .detail {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(12, 17, 25, 0.94);
      box-shadow: var(--shadow);
    }

    .canvas-wrap {
      position: relative;
      overflow: auto;
    }

    svg {
      min-width: 980px;
      width: 100%;
      height: 720px;
      display: block;
      background:
        radial-gradient(circle at 20px 20px, rgba(244,247,251,0.08) 1px, transparent 1px) 0 0 / 28px 28px,
        var(--bg);
    }

    .edge {
      stroke: #687386;
      stroke-width: 1.4;
      fill: none;
      marker-end: url(#arrow);
      opacity: 0.7;
    }

    .edge.dim { opacity: 0.12; }
    .edge.active { stroke: var(--accent); stroke-width: 2.5; opacity: 1; }

    .node rect {
      fill: var(--panel);
      stroke: var(--line);
      stroke-width: 1.2;
      rx: 8;
    }

    .node text {
      fill: var(--ink);
      font-size: 13px;
      dominant-baseline: middle;
      text-anchor: middle;
      pointer-events: none;
    }

    .node .tag {
      font-size: 10px;
      fill: var(--muted);
    }

    .node.teacher rect { stroke: var(--teacher); }
    .node.parent rect { stroke: var(--parent); }
    .node.admin rect { stroke: var(--admin); }
    .node.cross rect { stroke: var(--accent); stroke-dasharray: 4 3; }
    .node:hover rect,
    .node.active rect {
      stroke-width: 2.4;
      filter: drop-shadow(0 8px 14px rgba(36,35,31,0.16));
    }

    .node.dim { opacity: 0.22; }

    .legend {
      position: sticky;
      left: 0;
      bottom: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: rgba(13, 18, 27, 0.9);
      border-top: 1px solid var(--line);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .detail {
      overflow: auto;
      padding: 18px;
    }

    .detail h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.25;
    }

    .detail .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      background: var(--panel);
    }

    .detail p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    .route-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .route-list li {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      line-height: 1.45;
    }

    .route-list strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 280px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 1020px) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: static;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .entry-tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .workspace { grid-template-columns: 1fr; }
      .detail { min-height: 260px; }
    }

    @media (max-width: 680px) {
      aside, main { padding: 14px; }
      .entry-tabs,
      .mode-tabs,
      .toolbar { grid-template-columns: 1fr; }
      .chips { justify-content: flex-start; }
      svg { min-width: 820px; height: 680px; }
    }
  </style>
</head>

    function layout(nodes, edges = []) {
      const nodeWidth = 168;
      const nodeHeight = 54;
      const columnGap = 32;
      const rowGap = 40;
      const levelGap = 56;
      const maxPerRow = 6;
      const explicitLevels = new Map(nodes.filter(node => Number.isFinite(node[4])).map(node => [node[0], node[4]]));
      const ids = new Set(nodes.map(node => node[0]));
      const incoming = new Map(nodes.map(node => [node[0], 0]));
      const outgoing = new Map(nodes.map(node => [node[0], []]));

      edges.forEach(([source, target]) => {
        if (!ids.has(source) || !ids.has(target)) return;
        incoming.set(target, (incoming.get(target) || 0) + 1);
        outgoing.get(source).push(target);
      });

      const inferred = new Map();
      const roots = nodes.filter(node => (incoming.get(node[0]) || 0) === 0).map(node => node[0]);
      const queue = (roots.length ? roots : [nodes[0]?.[0]]).filter(Boolean).map(id => [id, explicitLevels.get(id) ?? 0]);

      while (queue.length) {
        const [id, level] = queue.shift();
        if (inferred.has(id) && inferred.get(id) <= level) continue;
        inferred.set(id, level);
        (outgoing.get(id) || []).forEach(target => {
          const nextLevel = explicitLevels.get(target) ?? level + 1;
          queue.push([target, nextLevel]);
        });
      }

      nodes.forEach((node, index) => {
        if (!inferred.has(node[0])) inferred.set(node[0], explicitLevels.get(node[0]) ?? index);
      });

      const groups = new Map();
      nodes.forEach(node => {
        const level = explicitLevels.get(node[0]) ?? inferred.get(node[0]) ?? 0;
        if (!groups.has(level)) groups.set(level, []);
        groups.get(level).push(node);
      });

      const levelRows = Array.from(groups.values()).map(group => Math.ceil(group.length / maxPerRow));
      const widestCount = Math.max(...Array.from(groups.values()).map(group => Math.min(group.length, maxPerRow)), 1);
      const canvasWidth = Math.max(980, 120 + widestCount * nodeWidth + (widestCount - 1) * columnGap);
      const placed = {};
      let y = 50;

      Array.from(groups.keys()).sort((a, b) => a - b).forEach((level, levelIndex) => {
        const group = groups.get(level);
        const rows = Math.ceil(group.length / maxPerRow);
        for (let row = 0; row < rows; row++) {
          const rowNodes = group.slice(row * maxPerRow, row * maxPerRow + maxPerRow);
          const rowWidth = rowNodes.length * nodeWidth + (rowNodes.length - 1) * columnGap;
          const startX = (canvasWidth - rowWidth) / 2;
          rowNodes.forEach((node, col) => {
            placed[node[0]] = {
              id: node[0],
              label: node[1],
              type: node[2],
              tag: node[3],
              level,
              x: startX + col * (nodeWidth + columnGap),
              y: y + row * (nodeHeight + rowGap),
              w: nodeWidth,
              h: nodeHeight
            };
          });
        }
        y += rows * (nodeHeight + rowGap) + (levelIndex === levelRows.length - 1 ? 0 : levelGap);
      });

      placed.__bounds = { width: canvasWidth, height: Math.max(720, y + 80) };
      return placed;
    }

    function isVisible(node) {
      const queryHit = !state.query || `${node.label} ${node.tag} ${node.id}`.toLowerCase().includes(state.query.toLowerCase());
      const filterHit = state.filter === 'all' || node.type === state.filter;
      return queryHit && filterHit;
    }

    function renderGraph() {
      const module = currentModule();
      const nodes = layout(module.nodes, module.edges);
      const bounds = nodes.__bounds || { width: 980, height: 720 };
      delete nodes.__bounds;
      const nodeValues = Object.values(nodes);
      const visibleIds = new Set(nodeValues.filter(isVisible).map(n => n.id));
      const activeId = state.activeNode || nodeValues[0]?.id;
      state.activeNode = activeId;
      svg.setAttribute('viewBox', `0 0 ${bounds.width} ${bounds.height}`);
      svg.style.width = `${Math.round(bounds.width * state.zoom)}px`;
      svg.style.height = `${Math.round(bounds.height * state.zoom)}px`;
      svg.style.minWidth = `${Math.round(Math.min(bounds.width * state.zoom, bounds.width))}px`;
      zoomValue.textContent = `${Math.round(state.zoom * 100)}%`;
      svg.innerHTML = `
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#687386"></path>
          </marker>
        </defs>
      `;

      const activeLinks = new Set();
      module.edges.forEach(([source, target]) => {
        if (source === activeId || target === activeId) {
          activeLinks.add(source);
          activeLinks.add(target);
        }
      });

      module.edges.forEach(([source, target]) => {
        const a = nodes[source];
        const b = nodes[target];
        if (!a || !b) return;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const sameLevel = Math.abs((a.y + a.h / 2) - (b.y + b.h / 2)) < 20;
        let d;
        if (sameLevel) {
          const sx = a.x + a.w;
          const sy = a.y + a.h / 2;
          const tx = b.x;
          const ty = b.y + b.h / 2;
          const mid = Math.max(36, Math.abs(tx - sx) / 2);
          d = `M ${sx} ${sy} C ${sx + mid} ${sy}, ${tx - mid} ${ty}, ${tx} ${ty}`;
        } else {
          const sx = a.x + a.w / 2;
          const sy = a.y + a.h;
          const tx = b.x + b.w / 2;
          const ty = b.y;
          const mid = Math.max(36, Math.abs(ty - sy) / 2);
          d = `M ${sx} ${sy} C ${sx} ${sy + mid}, ${tx} ${ty - mid}, ${tx} ${ty}`;
        }
        path.setAttribute('d', d);
        const filtered = !visibleIds.has(source) || !visibleIds.has(target);
        path.setAttribute('class', 'edge' + (filtered ? ' dim' : '') + (source === activeId || target === activeId ? ' active' : ''));
        svg.appendChild(path);
      });

      nodeValues.forEach(node => {
        const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        const related = activeLinks.has(node.id) || node.id === activeId;
        const dim = !visibleIds.has(node.id) || (activeLinks.size && !related);
        group.setAttribute('class', `node ${node.type}${node.id === activeId ? ' active' : ''}${dim ? ' dim' : ''}`);
        group.setAttribute('tabindex', '0');
        group.setAttribute('role', 'button');
        group.setAttribute('aria-label', node.label);
        group.addEventListener('click', () => {
          state.activeNode = node.id;
          renderGraph();
        });
        group.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            state.activeNode = node.id;
            renderGraph();
          }
        });
        group.innerHTML = `
          <rect x="${node.x}" y="${node.y}" width="${node.w}" height="${node.h}"></rect>
          <text x="${node.x + node.w / 2}" y="${node.y + 22}">${escapeXml(shorten(node.label, 13))}</text>
          <text class="tag" x="${node.x + node.w / 2}" y="${node.y + 40}">${escapeXml(node.tag)}</text>
        `;
        svg.appendChild(group);
      });

      renderDetail(module, nodes[activeId]);
    }

    function renderDetail(module, node) {
      if (!node) {
        detail.innerHTML = '<div class="empty">无可展示节点</div>';
        return;
      }
      const incoming = module.edges.filter(edge => edge[1] === node.id).map(edge => edge[0]);
      const outgoing = module.edges.filter(edge => edge[0] === node.id).map(edge => edge[1]);
      const labels = new Map(module.nodes.map(n => [n[0], n[1]]));
      detail.innerHTML = `
        <h2>${escapeHtml(node.label)}</h2>
        <div class="meta">
          <span class="badge">${escapeHtml(PORTS[node.type]?.label || (node.type === 'cross' ? '跨端流转' : node.type))}</span>
          <span class="badge">${escapeHtml(module.title)}</span>
          <span class="badge">${escapeHtml(node.tag)}</span>
        </div>
        <p>${escapeHtml(module.summary)}</p>
        <ul class="route-list">
          <li><strong>进入来源</strong>${incoming.length ? incoming.map(id => escapeHtml(labels.get(id) || id)).join(' / ') : '模块入口'}</li>
          <li><strong>下一步</strong>${outgoing.length ? outgoing.map(id => escapeHtml(labels.get(id) || id)).join(' / ') : '流程终点'}</li>
        </ul>
      `;
    }

    function shorten(text, max) {
      return text.length > max ? text.slice(0, max - 1) + '…' : text;
    }

    function escapeXml(text) {
      return String(text).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c]));
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function render() {
      renderEntries();
      renderModules();
      renderFilters();
      renderGraph();
    }

    search.addEventListener('input', event => {
      state.query = event.target.value.trim();
      renderGraph();
    });

    function setZoom(value) {
      state.zoom = Math.min(2.25, Math.max(0.55, Number(value.toFixed(2))));
      renderGraph();
    }

    zoomIn.addEventListener('click', () => setZoom(state.zoom + 0.15));
    zoomOut.addEventListener('click', () => setZoom(state.zoom - 0.15));
    zoomReset.addEventListener('click', () => setZoom(1));

    render();
  </script>
</body>
</html>
